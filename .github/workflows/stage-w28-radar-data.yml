name: Stage W28 compact radar data

on:
  push:
    branches:
      - feat/compact-radar-ui
    paths:
      - ".github/workflows/stage-w28-radar-data.yml"

permissions:
  contents: write

jobs:
  stage-w28:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/compact-radar-ui

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Append W28 metadata and staging records
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          papers_path = Path("data/papers.yml")
          papers = papers_path.read_text(encoding="utf-8")
          blocks = {
            'doi:10.1103/n2hm-lk94': r'''

