                main_result: >-
                  作者把文献中的 Lax pairs 规范为 2×2 矩阵形式，使谱方程系数成为二次矩阵多项式。随后研究模 p 约化及其 p-curvature 型结构，逐个应用于经典 Painlevé 方程并写出相应积分。
                integrable_structure: >-
                  difference--differential Lax compatibility 是统一输入；有限特征下的矩阵谱结构把非线性 Painlevé 动力学转化为可计算的守恒量。不同方程不需分别猜测积分，而由同一谱机制生成。
                innovation: >-
                  论文把通常工作在复数域的 Painlevé Lax 表示推进到算术环境，并发现每个素数都产生新的积分数据。它提供了研究有限特征 Painlevé 动力学的统一工具，也打开可积系统与算术动力学之间的新接口。

