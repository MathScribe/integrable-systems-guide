              - "tau function"
              - "eight-vertex model"
          ''',
          }
          for paper_id, block in blocks.items():
              if f'id: "{paper_id}"' not in papers:
                  papers += block.rstrip() + "\n"
          papers_path.write_text(papers, encoding="utf-8")

          editions_path = Path("data/editions.yml")
          editions = editions_path.read_text(encoding="utf-8")
          if "\nfrontier_staging:\n" not in editions:
              raise SystemExit("frontier_staging is missing")
          staging = editions.split("\nfrontier_staging:\n", 1)[1]
          entries = {
            'doi:10.1103/n2hm-lk94': r'''

              - paper_id: "doi:10.1103/n2hm-lk94"
                signal_date: "2026-07-06"
                signal_type: "journal-publication"
                week: "2026-W28"
                arxiv_categories:
                  - "hep-th"
                  - "nlin.SI"
                structure_tags:
                  - "AKNS hierarchy"
                  - "spectral curve"
                summary: >-
                  论文研究 AdS3 的可积渐近对称性和黑洞热力学，证明非轴对称平稳黑洞的温度仍为常数，并把温度直接编码到平稳 Schrödinger 谱问题的谱多项式与超椭圆曲线中，同时构造 cnoidal KdV black hole。
                main_result: >-
                  作者计算 AKNS 边界条件下的场依赖 Killing vectors、规范荷及其代数，并分析相应平稳黑洞的热力学。对 KdV 子层级，论文给出周期孤子型黑洞解，说明其温度可由两份超椭圆谱曲线刻画。
                integrable_structure: >-
                  AdS3 边界动力学由 AKNS hierarchy 及无穷 Abelian 守恒荷控制。平稳方程对应 Schrödinger 谱问题，谱多项式定义的超椭圆曲线把可积层级、几何荷和黑洞温度连接起来。
                innovation: >-
                  创新在于谱数据不再只是引力方程与可积系统之间的形式类比，而直接决定可观测的热力学量。该工作展示了 AKNS 谱几何如何组织非轴对称黑洞，并把 cnoidal KdV 解提升为新的黑洞构造机制。

              - paper_id: "arxiv:2607.04756"
                signal_date: "2026-07-06"
                signal_type: "new-preprint"
                week: "2026-W28"
                arxiv_categories:
                  - "nlin.SI"
                  - "math-ph"
                structure_tags:
                  - "integrable discretization"
                  - "Pfaffian structure"
                summary: >-
                  论文提出包含 coupled complex short-pulse reduction 的多分量 short-pulse 新形式，并构造保持双线性、Pfaffian 与 N-soliton 结构的半离散和全离散模型。全离散系统同时给出可直接使用的自适应移动网格算法。
                main_result: >-
                  作者先通过 Hirota 双线性方法得到连续 MCSP 系统的 Pfaffian N-soliton 解，再推导对应半离散与全离散方程及其精确解。数值实验表明，全离散方程作为移动网格格式能准确追踪短脉冲传播。
                integrable_structure: >-
                  连续和离散模型共享双线性方程、Pfaffian tau 表示与可积约化。网格位置本身由离散可积变量决定，因此数值网格的自适应不是外加策略，而是从保持结构的离散化中自然产生。
                innovation: >-
                  工作同时保留可积结构、精确解和数值几何意义，区别于只逼近原 PDE 的普通差分格式。它为多分量短脉冲系统提供了从解析模型到结构保持计算的一体化框架。

              - paper_id: "arxiv:2607.05681"
                signal_date: "2026-07-06"
                signal_type: "new-preprint"
                week: "2026-W28"
                arxiv_categories:
                  - "nlin.SI"
                  - "math-ph"
                structure_tags:
                  - "Lax pair"
                  - "conservation laws"
                summary: >-
                  论文为三分量 generalized Konno--Oono system 构造含谱参数的线性问题，并严格证明存在无穷多个非平凡局部守恒律。可积性证明同时与 Lund--Regge 型 S3 曲面几何和一族周期变曲率行波曲面相连。
                main_result: >-
                  作者建立广义 Konno--Oono 方程的过定线性系统，分析 Riccati pseudo-potential 展开，并在完整方程流形上构造守恒律代表元。通过 horizontal cohomology 证明这些守恒律确实非平凡，并用行波生成 S3 中曲面。
                integrable_structure: >-
                  核心结构包括参数依赖 Lax 型线性问题、Riccati 展开、伪球面方程理论和水平上同调。谱结构产生守恒律，而同一移动标架又把 PDE 解解释为 Lund--Regge 几何中的浸入曲面。
                innovation: >-
                  论文不是仅写出一个形式 Lax pair，而完成了无穷守恒律非平凡性的严格证明。可积性、守恒量和 S3 曲面几何由同一结构推出，使这一新系统具有可继续发展的几何与谱基础。

              - paper_id: "arxiv:2607.06119"
                signal_date: "2026-07-07"
                signal_type: "new-preprint"
                week: "2026-W28"
                arxiv_categories:
                  - "nlin.CD"
                  - "nlin.SI"
                structure_tags:
                  - "wave kinetics"
                  - "inverse scattering"
                summary: >-
                  论文研究 KP-I 弱随机波的 wave-kinetic 演化，发现系统虽可由逆散射求解，仍可通过共振相互作用达到 Rayleigh--Jeans 型热化。热化伴随非局域谱传输和强低波数峰，呈现类似凝聚的统计结构。
                main_result: >-
                  作者推导并数值研究 KP-I 的波动动力学方程，证明共振过程保持无穷不变量和 Fourier 支集紧性。模拟显示不同初态可趋向一族平衡态，能量经非局域通道向低波数聚集。
                integrable_structure: >-
                  微观模型是 IST-integrable 的 KP-I 方程，但宏观描述采用受无穷守恒量约束的 wave-kinetic equation。可积不变量没有简单禁止热化，而是改变允许的谱传输路径和平衡态结构。
                innovation: >-
                  论文直接修正“可积性必然排斥热化”的常见直觉，揭示可积约束与随机波热化可以共存。它把可积湍流推进到宏观统计动力学，并提出低波数凝聚峰这一值得继续检验的新现象。

              - paper_id: "arxiv:2607.06409"
                signal_date: "2026-07-07"
                signal_type: "new-preprint"
                week: "2026-W28"
                arxiv_categories:
                  - "nlin.SI"
                  - "math-ph"
                structure_tags:
                  - "Darboux transformation"
                  - "asymptotics"
                summary: >-
                  论文构造 Fokas--Lenells 方程椭圆背景上的 N-elliptic localized solutions，并系统分析它们沿传播方向和方向之间的远场分解。高阶复杂波形被还原为可辨认的椭圆背景、局域成分和对称关系。
                main_result: >-
                  作者从 Lax pair 和 Weierstrass 椭圆函数得到基本解矩阵，再通过 N-fold Darboux--Bäcklund transformation 构造局域解。借助 sigma 函数形式的 Cauchy determinant，论文导出不同空间方向上的渐近表达并证明对称性质。
                integrable_structure: >-
                  椭圆有限带背景、Lax 谱问题、Darboux--Bäcklund dressing 和 sigma/Cauchy 行列式共同控制精确解。行列式结构使高阶 dressing 参数能够在远场中分离，从而得到可计算的渐近组成。
                innovation: >-
                  创新不在于再增加若干椭圆背景波形，而在于建立一套系统的远场解释。论文说明高阶 N-elliptic localized solutions 在各传播扇区如何分解，为理解其相互作用与几何结构提供了统一方法。

              - paper_id: "arxiv:2504.05200"
                signal_date: "2026-07-07"
                signal_type: "journal-publication"
                week: "2026-W28"
                arxiv_categories:
                  - "math.DG"
                structure_tags:
                  - "superintegrability"
                  - "affine hypersurfaces"
                summary: >-
                  论文把 abundant second-order conformally superintegrable systems 与一类非退化相对仿射超曲面正规化建立对应，并证明两边的共形等价概念相容。由此，高维超可积系统分类被转化为仿射微分几何问题。
                main_result: >-
                  作者定义 abundant manifolds，证明其底层度量必为共形平坦，并给出它们对应于哪些 relative affine hypersurface normalisations 的必要充分条件。进一步识别共形类与不指定正规化的 abundant hypersurface immersions。
                integrable_structure: >-
                  超可积系统由 structure tensor 编码，其代数可积条件决定局部恢复问题。论文把这一张量与仿射超曲面的度量、正规化和浸入几何对应，使守恒量分类进入可操作的几何框架。
                innovation: >-
                  工作提供了一个跨领域的结构翻译：难以直接处理的高维超可积分类可以改用仿射几何对象研究。必要充分条件与共形等价的兼容性使这一对应不只是类比，而是可复用的分类方法。

              - paper_id: "arxiv:2607.06942"
                signal_date: "2026-07-08"
                signal_type: "new-preprint"
                week: "2026-W28"
                arxiv_categories:
                  - "math-ph"
                  - "nlin.SI"
                structure_tags:
                  - "soliton systems"
                  - "generalized hydrodynamics"
                summary: >-
                  论文研究由 Mealy automata 生成的离散孤子系统，给出 Bernoulli product measures 与双边齐次 Markov distributions 保持不变的判据，并计算三类 box--ball 型模型的孤子速度和两体 phase shift。
                main_result: >-
                  作者在双无限配置空间上定义 Mealy automaton 时间演化，证明一般的不变测度充分条件，并应用于 BBS-S(2)、BBS-V(2) 和 BBS-C(2)。前两者保持 Bernoulli 测度，第三类保持包含 Bernoulli 情形的 Markov 分布。
                integrable_structure: >-
                  Mealy automata 编码可因子化的离散孤子散射，速度和 phase shift 提供有效准粒子数据。不变测度则为 generalized Gibbs ensembles 与 generalized hydrodynamics 所需的统计背景提供严格起点。
                innovation: >-
                  论文把新型离散孤子系统从确定性碰撞规则推进到概率平衡态。自动机结构、散射数据和不变测度首次在同一框架中结合，为研究这些模型的宏观输运建立了基础。

              - paper_id: "arxiv:2607.06980"
                signal_date: "2026-07-08"
                signal_type: "new-preprint"
                week: "2026-W28"
                arxiv_categories:
                  - "nlin.SI"
                  - "math-ph"
                structure_tags:
                  - "Lax pair"
