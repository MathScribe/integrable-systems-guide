name: Validate compact radar schema

on:
  pull_request:
    paths:
      - "data/**"
      - "docs/javascripts/radar.js"
      - "docs/stylesheets/radar.css"
      - "scripts/render_radar.py"
      - "scripts/test_radar_v2.py"
      - ".github/workflows/validate-radar-v2.yml"
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "docs/javascripts/radar.js"
      - "docs/stylesheets/radar.css"
      - "scripts/render_radar.py"
      - "scripts/test_radar_v2.py"

jobs:
  validate-radar-v2:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Test compact radar schema
        run: python scripts/test_radar_v2.py

      - name: Check JavaScript syntax
        run: node --check docs/javascripts/radar.js

      - name: Check generated pages
        run: python scripts/render_radar.py --check
