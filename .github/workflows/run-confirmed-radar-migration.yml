name: Run confirmed radar migration

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/run-confirmed-radar-migration.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/compact-radar-ui
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Execute the one-shot migration script
        id: migration
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent
          import traceback

          try:
              workflow = Path('.github/workflows/migrate-confirmed-radar.yml').read_text(encoding='utf-8')
              script = workflow.split("python - <<'PY'\n", 1)[1].split("\n          PY\n", 1)[0]
              script = script.replace(
                  "r'^##\\s+\\d+\\.\\s+(W\\d+):[^\\n]*$'",
                  "r'^##\\s+\\d+\\.\\s+(W\\d+)[:：][^\\n]*$'",
              )
              exec(compile(dedent(script), 'confirmed-radar-migration', 'exec'), {'__name__': '__main__'})
          except Exception:
              Path('migration-error.txt').write_text(traceback.format_exc(), encoding='utf-8')
              raise
          PY

      - name: Save migration traceback
        if: steps.migration.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add migration-error.txt
          git commit -m "Record radar migration failure"
          git push origin HEAD:feat/compact-radar-ui

      - name: Generate and validate site
        if: steps.migration.outcome == 'success'
        run: |
          python scripts/test_radar_v2.py
          python scripts/render_radar.py
          python scripts/render_radar.py --check
          node --check docs/javascripts/radar.js
          mkdocs build --strict

      - name: Remove one-shot files and commit
        if: steps.migration.outcome == 'success'
        run: |
          rm -f .github/workflows/run-confirmed-radar-migration.yml
          rm -f .github/workflows/migrate-confirmed-radar.yml
          rm -f .github/workflows/stage-w28-radar-data.yml
          rm -f migration-error.txt
          rm -rf site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs .github/workflows migration-error.txt
          git diff --cached --quiet && exit 0
          git commit -m "Migrate confirmed 30-day radar dataset"
          git push origin HEAD:feat/compact-radar-ui
