name: Validate site

on:
  pull_request:
    paths:
      - "docs/**"
      - "data/papers.yml"
      - "data/editions.yml"
      - "scripts/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Validate paper registry and edition history
        run: python scripts/validate_radar.py

      - name: Check generated radar pages
        run: python scripts/render_radar.py --check

      - name: Build MkDocs site
        run: mkdocs build --strict
