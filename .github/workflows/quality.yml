name: Validate site

on:
  pull_request:
    paths:
      - "docs/**"
      - "data/**"
      - "scripts/**"
      - "maintenance/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run complete project check
        run: python scripts/check_project.py
