name: Validate site

on:
  pull_request:
    paths:
      - "docs/**"
      - "data/papers.yml"
      - "data/editions.yml"
      - "scripts/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out pull-request merge
        run: |
          git init --quiet
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth=1 origin "${GITHUB_SHA}"
          git checkout --quiet FETCH_HEAD

      - name: Install renderer dependency
        run: pip install --quiet PyYAML

      - name: Check generated radar pages
        run: python scripts/render_radar.py --check

      - name: Install site dependencies
        run: pip install --quiet -r requirements.txt

      - name: Validate paper registry and edition history
        run: python scripts/validate_radar.py

      - name: Build MkDocs site
        run: mkdocs build --strict
