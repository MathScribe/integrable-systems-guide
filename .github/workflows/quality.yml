name: Validate site

on:
  pull_request:
    paths:
      - "docs/**"
      - "data/papers.yml"
      - "data/editions.yml"
      - "scripts/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/quality.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/radar-2026-07-16
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Validate paper registry and edition history
        run: python scripts/validate_radar.py

      - name: Render canonical radar pages
        run: python scripts/render_radar.py

      - name: Restore workflow and commit generated pages
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git checkout origin/main -- .github/workflows/quality.yml
          git add docs/index.md docs/radar/index.md docs/radar/latest.md docs/radar/2026-W29.md .github/workflows/quality.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Render July 16 radar pages canonically"
          git push origin HEAD:agent/radar-2026-07-16
