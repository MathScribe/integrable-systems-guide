name: Validate site

on:
  pull_request:
    paths:
      - "docs/**"
      - "data/papers.yml"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate paper registry
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path("data/papers.yml")
          papers = yaml.safe_load(path.read_text(encoding="utf-8"))
          if not isinstance(papers, list):
              raise SystemExit("data/papers.yml must contain a YAML list")

          seen = set()
          for index, paper in enumerate(papers, start=1):
              for field in ("id", "title", "authors", "url", "featured_on"):
                  if not paper.get(field):
                      raise SystemExit(f"paper #{index} is missing {field}")
              if not isinstance(paper["authors"], list):
                  raise SystemExit(f"{paper['id']}: authors must be a list")
              if not isinstance(paper["featured_on"], list):
                  raise SystemExit(f"{paper['id']}: featured_on must be a list")
              if paper["id"] in seen:
                  raise SystemExit(f"duplicate paper id: {paper['id']}")
              seen.add(paper["id"])

          print(f"validated {len(papers)} published paper records")
          PY

      - name: Build MkDocs site
        run: mkdocs build --strict
