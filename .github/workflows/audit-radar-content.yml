name: Audit radar content

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/audit-radar-content.yml"

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/compact-radar-ui
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Clean report fragments and normalize controlled tags
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          import subprocess
          from pathlib import Path

          import yaml

          editions_path = Path('data/editions.yml')
          data = yaml.safe_load(editions_path.read_text(encoding='utf-8'))
          papers = {item['id']: item for item in yaml.safe_load(Path('data/papers.yml').read_text(encoding='utf-8'))}
          frontier = data['frontier']

          rules = [
              ('AKNS hierarchy', (r'\bAKNS\b',)),
              ('2D Toda hierarchy', (r'2D[- ]Toda', r'2D Toda')),
              ('Ablowitz--Ladik hierarchy', (r'Ablowitz--Ladik',)),
              ('Drinfeld--Sokolov hierarchy', (r'Drinfeld--Sokolov',)),
              ('mKdV hierarchy', (r'\bmKdV hierarchy\b', r'modified KdV hierarchy')),
              ('Painlevé hierarchy', (r'Painlevé [IVX]+ hierarchy', r'Painlevé hierarchy')),
              ('Riemann--Hilbert problem', (r'Riemann--Hilbert', r'\bRHP\b')),
              ('nonlinear steepest descent', (r'nonlinear steepest descent', r'Deift--Zhou')),
              ('inverse scattering', (r'inverse scattering', r'\bIST\b', r'Gelfand--Levitan--Marchenko')),
              ('Darboux transformation', (r'Darboux',)),
              ('Bäcklund transformation', (r'Bäcklund',)),
              ('Yang--Baxter equation', (r'Yang--Baxter',)),
              ('Lax pair', (r'\bLax\b', r'zero-curvature')),
              ('Hamiltonian structure', (r'Hamiltonian', r'bihamiltonian', r'tri-Hamiltonian')),
              ('Poisson structure', (r'Poisson',)),
              ('Frobenius manifold', (r'Frobenius manifold',)),
              ('finite-gap', (r'finite-gap', r'finite genus', r'finite-genus', r'algebro-geometric')),
              ('spectral curve', (r'spectral curve', r'hyperelliptic')),
              ('Painlevé', (r'Painlevé',)),
              ('isomonodromy', (r'isomonodrom',)),
              ('tau function', (r'tau-function', r'tau function', r'tau/Hirota')),
              ('integrable discretization', (r'fully discrete', r'integrable discret', r'semi-discrete', r'difference operator')),
              ('recursion operator', (r'recursion operator',)),
              ('soliton gas', (r'soliton gas',)),
              ('soliton resolution', (r'soliton resolution',)),
              ('generalized hydrodynamics', (r'generalized hydrodynamics', r'generalized Gibbs')),
              ('loop equations', (r'loop equation',)),
              ('integrable probability', (r'random matrix', r'Brownian bridge', r'Airy[_ ]?beta', r'Sine[_ ]?beta', r'HCIZ')),
              ('quantum integrability', (r'quantum integr', r'quantum spin', r'integrable quantum', r'quantum circuit')),
              ('transfer matrix', (r'transfer matrix',)),
              ('Bethe ansatz', (r'Bethe ansatz',)),
              ('Chern--Simons theory', (r'Chern--Simons',)),
              ('inverse problem', (r'inverse problem', r'reconstruct', r'tomography')),
              ('conservation laws', (r'conservation law', r'conserved quantities', r'integrals of motion')),
              ('symplectic geometry', (r'symplectic', r'Liouville integrability')),
              ('integrable geometry', (r'discrete conformal', r'circle pattern', r'affine hypersurface', r'superintegrable')),
              ('topological vector potential', (r'topological vector potential', r'virtual monopole')),
              ('wave kinetics', (r'wave kinetic', r'thermalization')),
              ('multiple orthogonal polynomials', (r'multiple orthogonal polynomial',)),
              ('Laurent property', (r'Laurent property',)),
              ('Pfaffian', (r'Pfaffian',)),
              ('bilinear method', (r'bilinear', r'Hirota method')),
              ('squared eigenfunctions', (r'squared eigenfunction',)),
              ('Poisson--Lie geometry', (r'Poisson--Lie',)),
          ]
          controlled = {name for name, _ in rules}
          contamination = re.compile(r'\s+##\s+\d+(?:\.\d+)*\.|\s+##\s+[A-Za-z一-龥]')

          cleaned_count = 0
          retagged_count = 0
          for entry in frontier['entries']:
              for field in ('summary', 'main_result', 'integrable_structure', 'innovation'):
                  original = str(entry[field]).strip()
                  cleaned = contamination.split(original, maxsplit=1)[0].strip()
                  if cleaned != original:
                      cleaned_count += 1
                  entry[field] = cleaned

              paper = papers[entry['paper_id']]
              corpus = ' '.join(
                  [
                      str(paper.get('title', '')),
                      ' '.join(str(tag) for tag in paper.get('tags', [])),
                      entry['summary'],
                      entry['main_result'],
                      entry['integrable_structure'],
                      entry['innovation'],
                  ]
              )
              selected = []
              for name, patterns in rules:
                  if any(re.search(pattern, corpus, flags=re.IGNORECASE) for pattern in patterns):
                      selected.append(name)
                  if len(selected) == 2:
                      break
              if entry.get('structure_tags', []) != selected:
                  retagged_count += 1
              entry['structure_tags'] = selected
              assert all(tag in controlled for tag in selected)

          main_editions_text = subprocess.check_output(
              ['git', 'show', 'origin/main:data/editions.yml'], text=True, encoding='utf-8'
          )
          appended = yaml.safe_dump(
              {'frontier_weeks': data['frontier_weeks'], 'frontier': frontier},
              allow_unicode=True,
              sort_keys=False,
              width=120,
              default_flow_style=False,
          )
          editions_path.write_text(main_editions_text.rstrip() + '\n\n' + appended, encoding='utf-8')
          print(f'cleaned {cleaned_count} contaminated text fields; retagged {retagged_count} entries')
          PY

      - name: Add permanent content validation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/validate_frontier_data.py')
          text = path.read_text(encoding='utf-8')
          marker = 'PUBLIC_TEXT_FIELDS = ("summary", "main_result", "integrable_structure", "innovation")\n'
          vocabulary = '''PUBLIC_TEXT_FIELDS = ("summary", "main_result", "integrable_structure", "innovation")
          CONTROLLED_STRUCTURE_TAGS = {
              "AKNS hierarchy", "2D Toda hierarchy", "Ablowitz--Ladik hierarchy",
              "Drinfeld--Sokolov hierarchy", "mKdV hierarchy", "Painlevé hierarchy",
              "Riemann--Hilbert problem", "nonlinear steepest descent", "inverse scattering",
              "Darboux transformation", "Bäcklund transformation", "Yang--Baxter equation",
              "Lax pair", "Hamiltonian structure", "Poisson structure", "Frobenius manifold",
              "finite-gap", "spectral curve", "Painlevé", "isomonodromy", "tau function",
              "integrable discretization", "recursion operator", "soliton gas",
              "soliton resolution", "generalized hydrodynamics", "loop equations",
              "integrable probability", "quantum integrability", "transfer matrix",
              "Bethe ansatz", "Chern--Simons theory", "inverse problem", "conservation laws",
              "symplectic geometry", "integrable geometry", "topological vector potential",
              "wave kinetics", "multiple orthogonal polynomials", "Laurent property",
              "Pfaffian", "bilinear method", "squared eigenfunctions", "Poisson--Lie geometry",
          }
          FORBIDDEN_CONTENT_MARKERS = (
              "## ", "本轮值得关注的方向信号", "下一步", "reviewable PR", "自动合并",
          )
          '''
          if 'CONTROLLED_STRUCTURE_TAGS' not in text:
              if marker not in text:
                  raise RuntimeError('validation insertion marker missing')
              text = text.replace(marker, vocabulary, 1)

          old = '''                    raise ValueError(
                          f"{entry['paper_id']}.{field} contains deprecated public wording: {term}"
                      )
          
              dates = [entry["signal_date"] for entry in entries]
          '''
          new = '''                    raise ValueError(
                          f"{entry['paper_id']}.{field} contains deprecated public wording: {term}"
                      )
                  for marker in FORBIDDEN_CONTENT_MARKERS:
                      if marker in text:
                          raise ValueError(
                              f"{entry['paper_id']}.{field} contains report or workflow residue: {marker}"
                          )
              for tag in entry.get("structure_tags", []):
                  if tag not in CONTROLLED_STRUCTURE_TAGS:
                      raise ValueError(f"{entry['paper_id']} has uncontrolled structure tag: {tag}")
          
              dates = [entry["signal_date"] for entry in entries]
          '''
          if old not in text:
              raise RuntimeError('validation loop insertion marker missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Generate and validate
        run: |
          python scripts/test_radar_v2.py
          python scripts/validate_frontier_data.py
          python scripts/render_radar.py
          python scripts/render_radar.py --check
          node --check docs/javascripts/radar.js
          mkdocs build --strict
          python - <<'PY'
          from pathlib import Path
          for path in [Path('docs/index.md'), *sorted(Path('docs/radar').glob('2026-W*.md'))]:
              text = path.read_text(encoding='utf-8')
              if '<p>' in text and '## ' in text:
                  raise SystemExit(f'report heading residue remains in {path}')
          PY
          rm -rf site

      - name: Remove workflow and commit
        run: |
          rm -f .github/workflows/audit-radar-content.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs scripts .github/workflows
          git commit -m "Audit radar annotations and controlled tags"
          git push origin HEAD:feat/compact-radar-ui
