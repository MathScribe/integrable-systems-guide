name: Migrate confirmed 30-day radar

on:
  push:
    branches:
      - feat/compact-radar-ui
    paths:
      - ".github/workflows/migrate-confirmed-radar.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/compact-radar-ui
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build confirmed 44-paper dataset
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import html
          import re
          import time
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from pathlib import Path

          import yaml

          ROOT = Path('.')
          PAPERS_PATH = ROOT / 'data' / 'papers.yml'
          EDITIONS_PATH = ROOT / 'data' / 'editions.yml'
          REPORT_URLS = [
              'https://raw.githubusercontent.com/MathScribe/integrable-systems-guide/planning/site-reorganization-plan/W25_W27_RETROSPECTIVE_SCREENING_REPORT.md',
              'https://raw.githubusercontent.com/MathScribe/integrable-systems-guide/planning/site-reorganization-plan/W28_W29_RETROSPECTIVE_SCREENING_REPORT.md',
          ]
          USER_AGENT = 'integrable-systems-guide radar migration (github.com/MathScribe/integrable-systems-guide)'

          def fetch_text(url: str, attempts: int = 4) -> str:
              request = urllib.request.Request(url, headers={'User-Agent': USER_AGENT})
              last_error = None
              for attempt in range(attempts):
                  try:
                      with urllib.request.urlopen(request, timeout=45) as response:
                          return response.read().decode('utf-8')
                  except Exception as exc:
                      last_error = exc
                      time.sleep(2 ** attempt)
              raise RuntimeError(f'failed to fetch {url}: {last_error}')

          def compact(value: str) -> str:
              value = re.sub(r'\s+', ' ', value).strip()
              return re.sub(r'(?<=[\u3400-\u9fff，。；：！？、）】》]) (?=[\u3400-\u9fff（【《])', '', value)

          def strip_title(value: str) -> str:
              value = re.sub(r'^\d+\.\d+\s+', '', value.strip())
              value = value.replace('\\(', '').replace('\\)', '')
              value = value.replace('`', '')
              return compact(value)

          def parse_reports(texts: list[str]) -> list[dict]:
              records: list[dict] = []
              for text in texts:
                  week_matches = list(re.finditer(r'^##\s+\d+\.\s+(W\d+):[^\n]*$', text, re.M))
                  for index, week_match in enumerate(week_matches):
                      week = f'2026-{week_match.group(1)}'
                      start = week_match.end()
                      end = week_matches[index + 1].start() if index + 1 < len(week_matches) else len(text)
                      section = text[start:end]
                      headings = list(re.finditer(r'^###\s+\d+\.\d+\s+(.+)$', section, re.M))
                      for h_index, heading in enumerate(headings):
                          block_start = heading.end()
                          block_end = headings[h_index + 1].start() if h_index + 1 < len(headings) else len(section)
                          block = section[block_start:block_end].strip()
                          source = block.split('**研究问题与主要结果。**', 1)[0].strip()
                          def field(label: str, next_label: str | None = None) -> str:
                              marker = f'**{label}。**'
                              if marker not in block:
                                  raise RuntimeError(f'missing {label}: {heading.group(1)}')
                              value = block.split(marker, 1)[1]
                              if next_label:
                                  value = value.split(f'**{next_label}。**', 1)[0]
                              return compact(value.strip())
                          main = field('研究问题与主要结果', '可积结构与方法')
                          structure = field('可积结构与方法', '创新')
                          innovation = field('创新')
                          records.append({
                              'week': week,
                              'title': strip_title(heading.group(1)),
                              'source': source,
                              'main_result': main,
                              'integrable_structure': structure,
                              'innovation': innovation,
                          })
              return records

          def source_links(source: str) -> list[tuple[str, str]]:
              return [(compact(re.sub(r'[*_`]', '', label)), urllib.parse.unquote(url))
                      for label, url in re.findall(r'\[([^\]]+)\]\((https?://[^)]+(?:\)[^)\s]*)?)\)', source)]

          def arxiv_id_from_source(source: str) -> str | None:
              match = re.search(r'arxiv\.org/abs/([0-9]{4}\.[0-9]{4,5}|[a-z-]+/\d{7})', source, re.I)
              return match.group(1) if match else None

          def doi_from_source(source: str) -> str | None:
              for _, url in source_links(source):
                  parsed = urllib.parse.urlparse(url)
                  haystack = urllib.parse.unquote(parsed.path)
                  match = re.search(r'(10\.\d{4,9}/[^?#\s]+)', haystack, re.I)
                  if match:
                      doi = match.group(1).rstrip('.,;]')
                      if not doi.lower().startswith('10.48550/arxiv'):
                          return doi
              return None

          def signal_info(source: str) -> tuple[str, str]:
              journal = re.search(r'(?:正式发表|首次在线发表|首次在线|在线发表)\s*(\d{4}-\d{2}-\d{2})', source)
              if journal:
                  return journal.group(1), 'journal-publication'
              preprint = re.search(r'新预印本\s*(\d{4}-\d{2}-\d{2})', source)
              if preprint:
                  return preprint.group(1), 'new-preprint'
              dates = re.findall(r'\d{4}-\d{2}-\d{2}', source)
              if dates:
                  return dates[-1], 'new-preprint'
              raise RuntimeError(f'cannot determine signal date: {source}')

          def report_categories(source: str) -> list[str]:
              values = re.findall(r'`([^`]+)`', source)
              out: list[str] = []
              for raw in values:
                  for value in re.split(r'\s*/\s*', raw):
                      value = value.strip()
                      if re.fullmatch(r'(?:[a-z-]+\.[A-Z]{2}|[a-z-]+(?:\.[a-z-]+)*)', value) and value not in out:
                          out.append(value)
              return out[:2]

          def fetch_arxiv_metadata(ids: list[str]) -> dict[str, dict]:
              namespace = {'a': 'http://www.w3.org/2005/Atom', 'arxiv': 'http://arxiv.org/schemas/atom'}
              result: dict[str, dict] = {}
              for offset in range(0, len(ids), 20):
                  batch = ids[offset:offset + 20]
                  query = urllib.parse.urlencode({'id_list': ','.join(batch)})
                  xml_text = fetch_text('https://export.arxiv.org/api/query?' + query)
                  root = ET.fromstring(xml_text)
                  for entry in root.findall('a:entry', namespace):
                      raw_id = entry.findtext('a:id', default='', namespaces=namespace).rsplit('/', 1)[-1]
                      arxiv_id = re.sub(r'v\d+$', '', raw_id)
                      authors = [compact(author.findtext('a:name', default='', namespaces=namespace))
                                 for author in entry.findall('a:author', namespace)]
                      categories = []
                      for category in entry.findall('a:category', namespace):
                          term = category.attrib.get('term', '')
                          if term and term not in categories:
                              categories.append(term)
                      result[arxiv_id] = {
                          'title': compact(entry.findtext('a:title', default='', namespaces=namespace)),
                          'authors': authors,
                          'submitted': (entry.findtext('a:published', default='', namespaces=namespace) or '')[:10],
                          'updated': (entry.findtext('a:updated', default='', namespaces=namespace) or '')[:10],
                          'categories': categories,
                      }
                  time.sleep(1)
              return result

          TAG_RULES = [
              ('Riemann--Hilbert', 'Riemann--Hilbert problem'),
              ('Riemann-Hilbert', 'Riemann--Hilbert problem'),
              ('inverse scattering', 'inverse scattering'),
              ('逆散射', 'inverse scattering'),
              ('Lax', 'Lax pair'),
              ('Yang--Baxter', 'Yang--Baxter equation'),
              ('Hamilton', 'Hamiltonian structure'),
              ('Poisson', 'Poisson structure'),
              ('Frobenius', 'Frobenius manifold'),
              ('Darboux', 'Darboux transformation'),
              ('Bäcklund', 'Bäcklund transformation'),
              ('Painlevé', 'Painlevé'),
              ('isomonodrom', 'isomonodromy'),
              ('等单值', 'isomonodromy'),
              ('tau', 'tau function'),
              ('谱曲线', 'spectral curve'),
              ('finite-gap', 'finite-gap'),
              ('有限带', 'finite-gap'),
              ('Chern--Simons', 'Chern--Simons theory'),
              ('loop equation', 'loop equations'),
              ('soliton gas', 'soliton gas'),
              ('可积离散', 'integrable discretization'),
              ('discret', 'integrable discretization'),
              ('Bethe', 'Bethe ansatz'),
              ('transfer matrix', 'transfer matrix'),
              ('conservation law', 'conservation laws'),
              ('守恒律', 'conservation laws'),
              ('Laurent', 'Laurent property'),
          ]

          def structure_tags(record: dict) -> list[str]:
              text = ' '.join([record['title'], record['integrable_structure'], record['innovation']])
              tags: list[str] = []
              for needle, tag in TAG_RULES:
                  if needle.lower() in text.lower() and tag not in tags:
                      tags.append(tag)
                  if len(tags) == 2:
                      break
              if not tags:
                  words = re.findall(r'[A-Za-z][A-Za-z-]+(?:\s+[A-Za-z][A-Za-z-]+){0,2}', record['title'])
                  tags = [compact(words[0])[:48]] if words else ['integrable systems']
              return tags[:2]

          def overview(main: str, innovation: str) -> str:
              sentences = [item for item in re.split(r'(?<=[。！？])', main) if item.strip()]
              value = ''
              for sentence in sentences:
                  if value and len(value) >= 105:
                      break
                  value += sentence.strip()
              if len(value) < 100:
                  first_innovation = re.split(r'(?<=[。！？])', innovation)[0].strip()
                  if first_innovation and first_innovation not in value:
                      value += first_innovation
              value = compact(value)
              if len(value) > 210:
                  value = value[:207].rstrip('，；： ') + '……'
              return value

          reports = [fetch_text(url) for url in REPORT_URLS]
          parsed = parse_reports(reports)
          if len(parsed) != 44:
              raise RuntimeError(f'expected 44 report entries, parsed {len(parsed)}')

          arxiv_ids = sorted({arxiv_id_from_source(item['source']) for item in parsed if arxiv_id_from_source(item['source'])})
          arxiv_meta = fetch_arxiv_metadata(arxiv_ids)

          papers = yaml.safe_load(PAPERS_PATH.read_text(encoding='utf-8')) or []
          by_id = {paper['id']: paper for paper in papers}
          by_arxiv = {paper.get('arxiv_id'): paper for paper in papers if paper.get('arxiv_id')}
          by_doi = {str(paper.get('doi')).lower(): paper for paper in papers if paper.get('doi')}

          frontier_entries: list[dict] = []
          seen: set[str] = set()
          for item in parsed:
              source = item['source']
              arxiv_id = arxiv_id_from_source(source)
              doi = doi_from_source(source)
              signal_date, signal_type = signal_info(source)
              existing = None
              if doi:
                  existing = by_doi.get(doi.lower()) or by_id.get('doi:' + doi)
              if existing is None and arxiv_id:
                  existing = by_arxiv.get(arxiv_id) or by_id.get('arxiv:' + arxiv_id)

              meta = arxiv_meta.get(arxiv_id or '', {})
              links = source_links(source)
              journal_label = next((label for label, url in links if 'arxiv.org' not in url), None)
              if existing is None:
                  if not arxiv_id and not doi:
                      raise RuntimeError(f'no identity for {item["title"]}')
                  paper_id = ('doi:' + doi) if doi else ('arxiv:' + arxiv_id)
                  paper = {
                      'id': paper_id,
                      'title': meta.get('title') or item['title'],
                      'authors': meta.get('authors') or ['Author metadata unavailable'],
                      'url': ('https://doi.org/' + doi) if doi else f'https://arxiv.org/abs/{arxiv_id}',
                      'arxiv_id': arxiv_id,
                      'doi': doi or (f'10.48550/arXiv.{arxiv_id}' if arxiv_id else None),
                  }
                  if meta.get('submitted'):
                      paper['submitted'] = meta['submitted']
                  if meta.get('updated'):
                      paper['updated'] = meta['updated']
                  if signal_type == 'journal-publication':
                      paper['published'] = signal_date
                      if journal_label:
                          paper['journal'] = journal_label
                  paper['metadata_checked_at'] = '2026-07-20'
                  paper['tags'] = structure_tags(item)
                  papers.append(paper)
                  by_id[paper_id] = paper
                  if arxiv_id:
                      by_arxiv[arxiv_id] = paper
                  if doi:
                      by_doi[doi.lower()] = paper
                  existing = paper
              else:
                  paper_id = existing['id']
                  if doi and (not existing.get('doi') or str(existing.get('doi')).lower().startswith('10.48550/arxiv')):
                      existing['doi'] = doi
                      existing['url'] = 'https://doi.org/' + doi
                  if signal_type == 'journal-publication':
                      existing['published'] = signal_date
                      if journal_label and not existing.get('journal'):
                          existing['journal'] = journal_label
                  if arxiv_id and not existing.get('arxiv_id'):
                      existing['arxiv_id'] = arxiv_id
                  if meta.get('authors') and existing.get('authors') == ['Author metadata unavailable']:
                      existing['authors'] = meta['authors']

              categories = report_categories(source)
              if not categories:
                  categories = [cat for cat in meta.get('categories', []) if cat][:2]
              entry = {
                  'paper_id': paper_id,
                  'signal_date': signal_date,
                  'signal_type': signal_type,
                  'week': item['week'],
                  'arxiv_categories': categories[:2],
                  'structure_tags': structure_tags(item),
                  'summary': overview(item['main_result'], item['innovation']),
                  'main_result': item['main_result'],
                  'integrable_structure': item['integrable_structure'],
                  'innovation': item['innovation'],
              }
              if paper_id in seen:
                  raise RuntimeError(f'duplicate selected paper: {paper_id}')
              seen.add(paper_id)
              frontier_entries.append(entry)

          if len(frontier_entries) != 44 or len(seen) != 44:
              raise RuntimeError('frontier dataset is not 44 unique papers')
          frontier_entries.sort(key=lambda item: (item['signal_date'], item['paper_id']), reverse=True)

          data = yaml.safe_load(EDITIONS_PATH.read_text(encoding='utf-8')) or {}
          data.pop('frontier_staging', None)
          week_info = {
              '2026-W25': ('2026-06-20 至 2026-06-21', '任意亏格暗孤子气体渐近与 Laurent 离散方程不变量。', 2),
              '2026-W26': ('2026-06-22 至 2026-06-28', '双 Hamilton/Frobenius 几何、Painlevé 约化、Lax 层级分类、量子电路与数据驱动可积性。', 16),
              '2026-W27': ('2026-06-29 至 2026-07-05', '有限带估计、Riemann--Hilbert 过渡渐近、拓扑与引力约化中的可积结构。', 6),
              '2026-W28': ('2026-07-06 至 2026-07-12', '可积引力、离散化、Painlevé、随机矩阵、量子自旋链、离散几何与多分量波。', 15),
              '2026-W29': ('2026-07-13 至 2026-07-19', 'Chern--Simons 可积引力、孤子层析、任意多峰多谷解族与 HCIZ 矩阵模型。', 5),
          }
          weeks = []
          for week_id, (date_range, summary, selected) in week_info.items():
              weeks.append({
                  'id': week_id,
                  'date_range': date_range,
                  'summary': summary,
                  'screening': {
                      'sources_checked': [
                          'arXiv nlin.SI / nlin.PS 与跨分类结构词、结果词检索',
                          '期刊 online-first、DOI 与出版商页面核验',
                      ],
                      'selected': selected,
                      'coverage_note': '公开页面只展示最终收录论文。期刊 online-first 覆盖仍可能不完整。',
                  },
              })
          data['weeks'] = weeks
          data['frontier'] = {
              'window_days': 30,
              'generated_through': '2026-07-19',
              'entries': frontier_entries,
          }

          PAPERS_PATH.write_text(
              '# Current bibliographic metadata used for identity, deduplication, and display.\n'
              '# Recommendation history and annotations live in data/editions.yml.\n\n'
              + yaml.safe_dump(papers, allow_unicode=True, sort_keys=False, width=110),
              encoding='utf-8',
          )
          EDITIONS_PATH.write_text(
              '# Recommendation history and editorial annotations.\n'
              '# The enabled frontier block drives the public 30-day radar.\n\n'
              + yaml.safe_dump(data, allow_unicode=True, sort_keys=False, width=110),
              encoding='utf-8',
          )
          print(f'wrote {len(frontier_entries)} confirmed radar entries and {len(papers)} paper records')
          PY

      - name: Generate and validate site
        run: |
          python scripts/test_radar_v2.py
          python scripts/render_radar.py
          python scripts/render_radar.py --check
          node --check docs/javascripts/radar.js
          mkdocs build --strict

      - name: Remove one-shot migration files
        run: |
          rm -f .github/workflows/migrate-confirmed-radar.yml
          rm -f .github/workflows/stage-w28-radar-data.yml
          rm -rf site

      - name: Commit completed migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs .github/workflows
          git diff --cached --quiet && exit 0
          git commit -m "Migrate confirmed 30-day radar dataset"
          git push origin HEAD:feat/compact-radar-ui
