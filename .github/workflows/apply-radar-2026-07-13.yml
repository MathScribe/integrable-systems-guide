name: Apply July 13 radar edition

on:
  push:
    branches:
      - agent/radar-2026-07-13

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/radar-2026-07-13
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml mkdocs-material
      - name: Update registry and edition data
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          papers_path = Path('data/papers.yml')
          papers = papers_path.read_text(encoding='utf-8')
          additions = r'''

          - id: "arxiv:2606.10037"
            title: "Noncommutative NLS systems: Darboux--Bäcklund transformations and integrable discretisations"
            authors:
              - "Sotiris Konstantinou-Rizos"
            url: "https://arxiv.org/abs/2606.10037"
            arxiv_id: "2606.10037"
            doi: "10.48550/arXiv.2606.10037"
            submitted: "2026-06-08"
            updated: "2026-06-08"
            version: "v1"
            metadata_checked_at: "2026-07-13"
            tags:
              - "noncommutative NLS"
              - "Kaup--Newell system"
              - "Darboux--Bäcklund transformation"
              - "integrable discretization"
              - "reduction groups"

          - id: "arxiv:2507.21660"
            title: "Darboux transformations and related non-Abelian integrable differential-difference systems of the derivative nonlinear Schrödinger type"
            authors:
              - "Edoardo Peroni"
              - "Jing Ping Wang"
            url: "https://arxiv.org/abs/2507.21660"
            arxiv_id: "2507.21660"
            doi: "10.48550/arXiv.2507.21660"
            submitted: "2025-07-29"
            updated: "2025-07-29"
            version: "v1"
            metadata_checked_at: "2026-07-13"
            tags:
              - "non-Abelian DNLS"
              - "Darboux transformation"
              - "differential-difference systems"
              - "reduction groups"
              - "quasideterminants"

          - id: "doi:10.1111/sapm.12287"
            title: "Multi-breathers and high order rogue waves for the nonlinear Schrödinger equation on the elliptic function background"
            authors:
              - "Bao-Feng Feng"
              - "Liming Ling"
              - "Daisuke A. Takahashi"
            url: "https://doi.org/10.1111/sapm.12287"
            arxiv_id: "1812.04212"
            doi: "10.1111/sapm.12287"
            journal: "Studies in Applied Mathematics"
            year: 2019
            submitted: "2018-12-11"
            updated: "2018-12-11"
            version: "v1"
            metadata_checked_at: "2026-07-13"
            tags:
              - "focusing NLS"
              - "elliptic background"
              - "multi-breathers"
              - "rogue waves"
              - "squared eigenfunctions"

          - id: "doi:10.1088/0305-4470/35/36/310"
            title: "Integrable discretizations of derivative nonlinear Schroedinger equations"
            authors:
              - "Takayuki Tsuchida"
            url: "https://doi.org/10.1088/0305-4470/35/36/310"
            arxiv_id: "nlin/0105053"
            doi: "10.1088/0305-4470/35/36/310"
            journal: "Journal of Physics A: Mathematical and General"
            volume: "35"
            pages: "7827"
            year: 2002
            submitted: "2001-05-24"
            updated: "2002-08-28"
            version: "v3"
            metadata_checked_at: "2026-07-13"
            tags:
              - "DNLS"
              - "Kaup--Newell equation"
              - "Chen--Lee--Liu equation"
              - "Gerdjikov--Ivanov equation"
              - "integrable discretization"
          '''.replace('\n          ', '\n').rstrip() + '\n'
          if 'arxiv:2606.10037' not in papers:
              papers_path.write_text(papers.rstrip() + additions, encoding='utf-8')

          editions_path = Path('data/editions.yml')
          editions = editions_path.read_text(encoding='utf-8')
          week_block = r'''  - id: "2026-W29"
            date_range: "2026-07-13 至 2026-07-19"
            summary: >-
              本周从 non-Abelian 与 noncommutative DNLS 出发，连接 Darboux--Bäcklund
              变换、可积离散化、椭圆背景精确解与课题组相关的 rogue-wave 方法。
            tags:
              - "DNLS"
              - "noncommutative systems"
              - "Darboux--Bäcklund transformation"
              - "integrable discretization"
              - "elliptic background"
          '''.replace('\n          ', '\n')
          edition_block = r'''  - date: "2026-07-13"
            week: "2026-W29"
            summary: >-
              本期按“近期非交换推广—非 Abelian Darboux 分类—经典 DNLS 离散化—椭圆背景
              breather 与 rogue wave”组织，突出连续系统、Darboux 变换和格点模型之间的结构联系。
            entries:
              - paper_id: "arxiv:2606.10037"
                role: "missed-recent"
                homepage_rank: 1
                what_it_does: >-
                  研究 AKNS、Kaup--Newell DNLS 与 Mikhailov--Shabat--Yamilov 变形的非交换推广，
                  推导连续极限、Darboux--Bäcklund 变换和 vertex--bond 型可积离散系统；其中变形
                  DNLS 的 Lax 表示必须引入非局部变量，并给出六点格点方程的显式波解。
                why_read: >-
                  它把 DNLS、reduction group、非交换代数与离散化放在同一框架中，是理解近期
                  matrix/non-Abelian DNLS 工作如何从标量 Kaup--Newell 结构扩展出去的直接入口。
              - paper_id: "arxiv:2507.21660"
                role: "missed-recent"
                homepage_rank: 2
                what_it_does: >-
                  为七类具有 Lax 表示的 non-Abelian DNLS 构造与 reduction group 相容的线性和
                  二次 Darboux 矩阵，得到 Volterra、Ablowitz--Ladik、Merola--Ragnisco--Tu 与
                  relativistic Toda 型微分差分系统，并用 quasideterminant 分析二次矩阵的分解。
                why_read: >-
                  这篇文章提供了上一条近期工作的直接技术上游：它把 Darboux transformation
                  当作可积格点动力学本身，而不只是生成显式解的 dressing 工具。
              - paper_id: "doi:10.1088/0305-4470/35/36/310"
                role: "journal-version"
                homepage_rank: 3
                what_it_does: >-
                  通过 Lax pair 为 Kaup--Newell、Chen--Lee--Liu 和 Gerdjikov--Ivanov 三类 DNLS
                  构造保持复共轭约化与双 Hamilton 结构的可积离散化，并由变量变换和约化导出
                  matrix NLS、coupled NLS、Hirota、Sasa--Satsuma 等多类格点系统。
                why_read: >-
                  它是今天两篇 non-Abelian/noncommutative 工作反复依赖的经典基线，可用于核对
                  各类 DNLS 离散系统的 Lax 结构、约化关系和连续极限。
              - paper_id: "doi:10.1111/sapm.12287"
                role: "group-adjacent"
                what_it_does: >-
                  在 dn、cn 与带相位调制的椭圆背景上用 Darboux transformation 构造 focusing NLS
                  多 breather，并以 theta 行列式表示；同时用 squared eigenfunctions 求线性化谱，
                  再在分支点极限下得到高阶 rogue waves。
                why_read: >-
                  这篇 Liming Ling 合作论文把有限带背景、调制不稳定性、Darboux 极限与 rogue wave
                  统一起来，为当前 Fokas--Lenells 椭圆背景局域解提供非常具体的比较对象。
          '''.replace('\n          ', '\n')
          if 'id: "2026-W29"' not in editions:
              editions = editions.replace('weeks:\n', 'weeks:\n' + week_block + '\n', 1)
          if 'date: "2026-07-13"' not in editions:
              editions = editions.replace('editions:\n', 'editions:\n' + edition_block + '\n', 1)
          editions_path.write_text(editions, encoding='utf-8')
          PY
      - name: Render and validate
        run: |
          python scripts/render_radar.py
          python scripts/validate_radar.py
          python scripts/render_radar.py --check
          mkdocs build --strict
      - name: Remove bootstrap workflow and commit edition
        run: |
          git rm .github/workflows/apply-radar-2026-07-13.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers.yml data/editions.yml docs/index.md docs/radar/index.md docs/radar/latest.md docs/radar/2026-W29.md
          git commit -m "Curate the July 13 non-Abelian DNLS reading chain"
          git push origin HEAD:agent/radar-2026-07-13
