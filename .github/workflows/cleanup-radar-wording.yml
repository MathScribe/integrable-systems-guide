name: Normalize compact radar wording

on:
  push:
    branches:
      - feat/compact-radar-ui
    paths:
      - ".github/workflows/cleanup-radar-wording.yml"

permissions:
  contents: write

jobs:
  normalize-wording:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/compact-radar-ui

      - name: Replace deprecated wording
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("data/editions.yml")
          text = path.read_text(encoding="utf-8")
          text = text.replace("新意在于", "创新在于")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit wording cleanup
        run: |
          if git diff --quiet -- data/editions.yml; then
            echo "No wording cleanup needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/editions.yml
          git commit -m "Normalize compact radar innovation wording"
          git push origin HEAD:feat/compact-radar-ui
