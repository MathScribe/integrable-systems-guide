name: Apply July 16 radar registry patch

on:
  push:
    branches:
      - agent/radar-2026-07-16
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[radar-patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/radar-2026-07-16
          fetch-depth: 0

      - name: Patch registry and edition history
        shell: python
        run: |
          from pathlib import Path

          papers = Path('data/papers.yml')
          ptext = papers.read_text(encoding='utf-8')
          additions = r'''

- id: "arxiv:2607.10870"
  title: "Loop-type geometric folding of exact solutions of shifted nonlocal NLS and MKdV equations"
  authors:
    - "Aslı Pekcan"
  url: "https://arxiv.org/abs/2607.10870"
  arxiv_id: "2607.10870"
  doi: "10.48550/arXiv.2607.10870"
  submitted: "2026-07-12"
  updated: "2026-07-12"
  version: "v1"
  metadata_checked_at: "2026-07-16"
  tags:
    - "shifted nonlocal NLS"
    - "shifted nonlocal mKdV"
    - "folded waves"
    - "exact solutions"
    - "geometric reparametrization"

- id: "doi:10.1016/j.physleta.2021.127793"
  title: "Soliton solutions of the shifted nonlocal NLS and MKdV equations"
  authors:
    - "Metin Gürses"
    - "Aslı Pekcan"
  url: "https://doi.org/10.1016/j.physleta.2021.127793"
  arxiv_id: "2106.14252"
  doi: "10.1016/j.physleta.2021.127793"
  journal: "Physics Letters A"
  article_number: "127793"
  year: 2021
  submitted: "2021-06-27"
  updated: "2021-06-29"
  version: "v2"
  metadata_checked_at: "2026-07-16"
  tags:
    - "shifted nonlocal NLS"
    - "shifted nonlocal mKdV"
    - "one- and two-solitons"
    - "singularities"
    - "Hirota method"

- id: "arxiv:2110.01047"
  title: "Shifted nonlocal Kundu type equations: Soliton solutions"
  authors:
    - "Aslı Pekcan"
  url: "https://arxiv.org/abs/2110.01047"
  arxiv_id: "2110.01047"
  doi: "10.48550/arXiv.2110.01047"
  submitted: "2021-10-03"
  updated: "2021-12-24"
  version: "v2"
  metadata_checked_at: "2026-07-16"
  tags:
    - "Kundu-type systems"
    - "Chen--Lee--Liu equation"
    - "Gerdjikov--Ivanov equation"
    - "Kaup--Newell equation"
    - "shifted nonlocal reductions"
    - "Hirota method"

- id: "arxiv:1510.00480"
  title: "Complete integrability of Nonlocal Nonlinear Schrödinger equation"
  authors:
    - "V. S. Gerdjikov"
    - "A. Saxena"
  url: "https://arxiv.org/abs/1510.00480"
  arxiv_id: "1510.00480"
  doi: "10.48550/arXiv.1510.00480"
  submitted: "2015-10-02"
  updated: "2016-06-14"
  version: "v2"
  metadata_checked_at: "2026-07-16"
  tags:
    - "nonlocal NLS hierarchy"
    - "squared solutions"
    - "inverse scattering"
    - "action-angle variables"
    - "Hamiltonian structures"
'''
          for identity in ('arxiv:2607.10870', 'doi:10.1016/j.physleta.2021.127793', 'arxiv:2110.01047', 'arxiv:1510.00480'):
              if f'id: "{identity}"' in ptext:
                  raise SystemExit(f'duplicate registry identity: {identity}')
          papers.write_text(ptext.rstrip() + additions + '\n', encoding='utf-8')

          editions = Path('data/editions.yml')
          etext = editions.read_text(encoding='utf-8')
          old_summary = '''    summary: >-
      本周从 non-Abelian 与 noncommutative DNLS、fully discrete Gerdjikov--Ivanov
      延伸到 Manakov 系统的 vector Akhmediev breathers、调制不稳定性与 dressing 方法。'''
          new_summary = '''    summary: >-
      本周从 non-Abelian 与 noncommutative DNLS、fully discrete Gerdjikov--Ivanov 和
      Manakov vector breathers，延伸到 shifted nonlocal NLS/mKdV、非局部 DNLS 约化与完整可积性。'''
          if old_summary not in etext:
              raise SystemExit('week summary anchor not found')
          etext = etext.replace(old_summary, new_summary, 1)
          tag_anchor = '      - "modulation instability"\n'
          etext = etext.replace(tag_anchor, tag_anchor + '      - "nonlocal NLS"\n      - "shifted reductions"\n', 1)
          edition_anchor = 'editions:\n'
          edition = r'''editions:
  - date: "2026-07-16"
    week: "2026-W29"
    summary: >-
      本期按“shifted nonlocal NLS/mKdV 的几何折叠—显式孤子基线—shifted nonlocal
      DNLS 约化—非局部 NLS 的谱与 Hamilton 结构”组织。
    entries:
      - paper_id: "arxiv:2607.10870"
        role: "recent"
        homepage_rank: 1
        what_it_does: >-
          把既有 shifted nonlocal NLS 与 mKdV 的一、二孤子解作为参数曲线的场变量，
          通过非单调空间映射构造 loop-type folded profiles；以折叠映射导数变号作为充分条件，
          并分析变形参数和孤子参数如何产生规则、振荡与奇异折叠。
        why_read: >-
          新意不在重新求解方程，而在清楚分离“解的振幅动力学”和“空间参数化几何”；
          这为阅读 loop/foldon 图形提供判别框架，也直接指向其依赖的 shifted-reduction 文献。
      - paper_id: "doi:10.1016/j.physleta.2021.127793"
        role: "journal-version"
        homepage_rank: 2
        what_it_does: >-
          为 shifted nonlocal NLS 与 mKdV 方程给出一、二孤子解，并系统讨论这些解的
          奇异结构和参数依赖；今天的新论文正是把这些显式解重新解释为可折叠的参数波形。
        why_read: >-
          这是新结果最直接的正式期刊上游，可用于区分来自方程与约化的结构，和后续
          folding map 对空间坐标的再参数化效应。
      - paper_id: "arxiv:2110.01047"
        role: "adjacent"
        homepage_rank: 3
        what_it_does: >-
          从可积 coupled Kundu-type system 的局部与 shifted nonlocal reductions 出发，
          对 Chen--Lee--Liu、Gerdjikov--Ivanov 和 Kaup--Newell 三类 DNLS 型方程用
          Hirota 双线性法构造一、二孤子解。
        why_read: >-
          它把 shifted nonlocal 主题直接拉回 DNLS 三分支，便于比较空间/时间平移约化
          怎样改变熟悉的 CLL、GI 与 KN 孤子公式和正则性条件。
      - paper_id: "arxiv:1510.00480"
        role: "method-background"
        what_it_does: >-
          利用 Lax 算子 squared solutions 的完备关系证明一类非局部 NLS 层级的完整可积性，
          描述两类孤子谱、由散射数据参数化的作用角变量，并构造 Hamilton 层级。
        why_read: >-
          它提供显式解论文缺少的谱论底座：非局部约化不仅产生新孤子公式，也会重组
          离散谱对称性、正则解类型和 Hamilton 结构。

'''
          if edition_anchor not in etext:
              raise SystemExit('edition anchor not found')
          etext = etext.replace(edition_anchor, edition, 1)
          editions.write_text(etext, encoding='utf-8')

          Path('.github/workflows/radar-patch-2026-07-16.yml').unlink()

      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/papers.yml data/editions.yml .github/workflows/radar-patch-2026-07-16.yml
          git commit -m "Apply July 16 registry patch [radar-patch]"
          git push origin HEAD:agent/radar-2026-07-16
