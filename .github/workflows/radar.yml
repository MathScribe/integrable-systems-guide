name: Daily Research Radar

on:
  schedule:
    # 07:30 Asia/Shanghai. GitHub Actions cron uses UTC.
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      brief_date:
        description: "Brief date in YYYY-MM-DD. Leave empty to use Asia/Shanghai today."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-research-radar
  cancel-in-progress: false

jobs:
  draft-brief-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate radar script
        run: |
          python -m py_compile scripts/radar.py
          python -m unittest discover -s tests

      - name: Determine brief date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.brief_date }}" ]; then
            echo "BRIEF_DATE=${{ github.event.inputs.brief_date }}" >> "$GITHUB_ENV"
          else
            echo "BRIEF_DATE=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_ENV"
          fi

      - name: Generate daily research radar update
        run: python scripts/radar.py --date "$BRIEF_DATE" --write

      - name: Update archive index if public weekly page exists
        shell: bash
        run: |
          python - <<'PY'
          import datetime as dt
          import os
          from pathlib import Path

          date = dt.date.fromisoformat(os.environ["BRIEF_DATE"])
          iso_year, iso_week, _ = date.isocalendar()
          week_id = f"{iso_year}-W{iso_week:02d}"
          week_path = Path("docs/radar") / f"{week_id}.md"
          index_path = Path("docs/radar/index.md")

          if not week_path.exists():
              print(f"No public weekly page {week_path}; archive index unchanged.")
              raise SystemExit(0)

          text = index_path.read_text(encoding="utf-8")
          link = f"- [{week_id}]({week_id}.md)"
          if link not in text:
              if f"## {iso_year}" not in text:
                  text = text.rstrip() + f"\n\n## {iso_year}\n\n{link}\n"
              else:
                  text = text.rstrip() + f"\n{link}\n"
              index_path.write_text(text, encoding="utf-8")
          PY

      - name: Validate MkDocs build
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          mkdocs build --strict

      - name: Create or update draft PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/index.md docs/radar data/papers.yml
          if [ -f data/candidates.yml ]; then
            git add data/candidates.yml
          fi

          if git diff --cached --quiet; then
            echo "No research radar changes to open as a PR."
            exit 0
          fi

          BRANCH="radar/daily-$BRIEF_DATE"
          BODY_FILE=".radar/summary.md"
          if [ ! -f "$BODY_FILE" ]; then
            mkdir -p .radar
            cat > "$BODY_FILE" <<EOF
          Automated research-radar update for $BRIEF_DATE.

          No machine-readable summary was produced. Review generated file changes manually before merging.
          EOF
          fi

          git checkout -B "$BRANCH"
          git commit -m "Draft research radar update for $BRIEF_DATE"
          git push --force-with-lease origin "$BRANCH"

          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Draft research radar update for $BRIEF_DATE" \
              --body-file "$BODY_FILE"
          else
            gh pr edit "$PR_NUMBER" --body-file "$BODY_FILE"
            echo "Updated existing PR #$PR_NUMBER for $BRIEF_DATE."
          fi
