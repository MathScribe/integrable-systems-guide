site_name: Integrable Systems Research Guide
site_description: Annotated research guide for integrable systems, IST, RHP methods, nonlinear steepest descent, nonlinear waves, and finite-gap methods.
site_url: https://mathscribe.github.io/integrable-systems-guide/
repo_url: https://github.com/MathScribe/integrable-systems-guide
repo_name: MathScribe/integrable-systems-guide

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Start here: start-here.md
  - Core topics: topics.md
  - Resources: resources.md
  - Group work: group-work.md
  - About: about.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
