site_name: Integrable Systems Research Guide
site_description: Annotated research guide for integrable systems, IST, RHP methods, nonlinear steepest descent, nonlinear waves, and finite-gap methods.
site_url: https://mathscribe.github.io/integrable-systems-guide/
repo_url: https://github.com/MathScribe/integrable-systems-guide
repo_name: MathScribe/integrable-systems-guide

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Daily Brief / 每日简报: index.md
  - Archive / 归档: radar/index.md
  - Resources / 资源: resources.md
  - Group work / 课题组相关: group-work.md
  - Core topics / 核心主题: topics.md
  - About / 关于: about.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/goatcounter.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
