site_name: Integrable Systems Research Guide
site_description: Annotated guide to integrable systems, recent papers, courses, notes, and group-related resources.
site_url: https://mathscribe.github.io/integrable-systems-guide/
repo_url: https://github.com/MathScribe/integrable-systems-guide
repo_name: MathScribe/integrable-systems-guide

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home / 首页: index.md
  - Core topics / 核心主题: topics.md
  - Group work / 课题组相关: group-work.md
  - Resources / 资源: resources.md
  - About / 关于: about.md

# Public methodology is linked from the homepage and About page, but is not a
# primary navigation destination.
not_in_nav: |
  editorial-policy.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra_css:
  - stylesheets/radar.css

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/goatcounter.js
  - javascripts/radar.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
