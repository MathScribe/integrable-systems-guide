# Recommendation history and editorial annotations.
# Bibliographic facts live in data/papers.yml; this file records when and why a
# paper was featured. Roles are intentionally stable across editions.

weeks:
  - id: "2026-W29"
    date_range: "2026-07-13 至 2026-07-19"
    summary: >-
      本周从 non-Abelian 与 noncommutative DNLS、fully discrete Gerdjikov--Ivanov
      延伸到 Manakov 系统的 vector Akhmediev breathers、调制不稳定性与 dressing 方法。
    tags:
      - "DNLS"
      - "Gerdjikov--Ivanov equation"
      - "Manakov system"
      - "vector breathers"
      - "modulation instability"
      - "Darboux transformation"
      - "Riemann--Hilbert problem"
      - "integrable discretization"

  - id: "2026-W28"
    date_range: "2026-07-06 至 2026-07-12"
    summary: >-
      本周集中在 DNLS、coupled NLS、Riemann--Hilbert 渐近、有限带退化与
      soliton gas，同时补入 Fokas--Lenells、Darboux transformation 和稳定性材料。
    tags:
      - "DNLS"
      - "coupled NLS"
      - "Riemann--Hilbert problem"
      - "finite-gap"
      - "soliton gas"
      - "Fokas--Lenells"

editions:
  - date: "2026-07-15"
    week: "2026-W29"
    summary: >-
      本期按“稳定频率占主导的新 vector AB—基于线性化本征向量的可控激发—
      非退化 AB 的 MI 存在图—dressing 方法下的 vector breather 分类与相互作用”组织。
    entries:
      - paper_id: "arxiv:2607.10954"
        role: "recent"
        homepage_rank: 1
        what_it_does: >-
          在 Manakov 系统中构造一种由不稳定模激发、但在峰值处由线性稳定谐波占主导的
          精确 vector Akhmediev breather；数值演化表明无需预先播种稳定分量，它会自发出现，
          并将主导机制定量归因于 four-wave mixing。
        why_read: >-
          它直接修正“breather 主频必定位于 MI 增益带内”的标量直觉，把多分量系统的稳定间隙、
          非线性频率转换和可实验观测的峰值谱结构联系起来。
      - paper_id: "arxiv:2606.21301"
        role: "missed-recent"
        homepage_rank: 2
        what_it_does: >-
          针对 focusing Manakov 系统中多个 MI 分支并存的问题，用目标分支的线性化本征向量
          设计初始 Fourier 扰动，使指定 vector Akhmediev breather 以接近百分之百的保真度被选择性激发。
        why_read: >-
          它给出今天新论文的控制论互补面：一篇解释稳定谐波如何被非线性放大，另一篇说明如何从
          线性阶段就选择目标分支，便于区分分支选择与后续 four-wave mixing 的作用。
      - paper_id: "doi:10.1088/0256-307X/39/9/094201"
        role: "journal-version"
        homepage_rank: 3
        what_it_does: >-
          发现 focusing Manakov 方程中的非退化 Akhmediev breather，给出其频率--波数存在图，
          并说明单频调制不稳定性可同时激发三个 AB，其中两个属于非退化分支。
        why_read: >-
          这是理解新结果所需的正式期刊基线：稳定间隙、多个 MI 分支与非退化 AB 的结构在这里
          首次被清楚分离，可用于核对新论文的参数窗口和谱分量解释。
      - paper_id: "arxiv:2211.07014"
        role: "method-background"
        what_it_does: >-
          用 dressing method 构造 Manakov 系统的多 vector-breather 解，分析三类基本 breather、
          碰撞位移、共振融合与衰变，并把不同类型对应到不稳定与稳定色散分支。
        why_read: >-
          它把今天的单个峰值谱现象放回完整的 vector-breather 分类和相互作用图景中，并解释为何
          稳定分支类型通常不从小扰动的 superregular MI 过程中直接出现。

  - date: "2026-07-14"
    week: "2026-W29"
    summary: >-
      本期按“fully discrete GI/hGI—高阶 GI 流的 RHP dressing—经典 GI 的
      Darboux/quasideterminant 精确解”组织，比较三种构造离散系统与高阶谱数据的方法。
    entries:
      - paper_id: "arxiv:2607.09333"
        role: "recent"
        homepage_rank: 1
        what_it_does: >-
          从带两组离散色散关系的 Sylvester 方程出发，构造四族共轭对称的 fully discrete
          Gerdjikov--Ivanov 模型及四族高阶 GI 格点模型；用对角与 Jordan 块谱矩阵给出
          N-soliton 和 multiple-pole 解，并通过两步连续极限恢复连续 GI/hGI 方程。
        why_read: >-
          它直接补上 GI 方程 fully discrete analogue 的空缺，并把 Cauchy matrix、连续极限、
          局部/非局部约化和多重极点放进同一计算框架，是昨天经典 DNLS 离散化链的自然续篇。
      - paper_id: "arxiv:2105.08412"
        role: "method-background"
        homepage_rank: 2
        what_it_does: >-
          对 GI 层级的三阶流建立 Riemann--Hilbert dressing，构造简单零点与 elementary
          high-order zeros 的 soliton matrices，分析单、双孤子的传播与弹性交互，并由极限过程
          得到高阶孤子矩阵。
        why_read: >-
          它提供与 Cauchy matrix/Jordan-block 构造互补的谱方法视角，可直接比较高阶色散如何
          改变速度、方向和振幅，以及高阶零点如何进入 RHP dressing。
      - paper_id: "doi:10.1080/14029251.2015.996438"
        role: "journal-version"
        homepage_rank: 3
        what_it_does: >-
          为标量 GI 方程构造标准 Darboux transformation，并用 quasideterminant 写出迭代解，
          以抛物型解、孤子和 breather 作为显式例子。
        why_read: >-
          这篇正式期刊论文给出最紧凑的 GI Darboux/quasideterminant 基线，便于把今天的新格点
          multiple-pole 公式与连续方程的经典 dressing 计算逐项对照。

  - date: "2026-07-13"
    week: "2026-W29"
    summary: >-
      本期按“近期非交换推广—非 Abelian Darboux 分类—经典 DNLS 离散化—椭圆背景
      breather 与 rogue wave”组织，突出连续系统、Darboux 变换和格点模型之间的结构联系。
    entries:
      - paper_id: "arxiv:2606.10037"
        role: "missed-recent"
        homepage_rank: 1
        what_it_does: >-
          研究 AKNS、Kaup--Newell DNLS 与 Mikhailov--Shabat--Yamilov 变形的非交换推广，
          推导连续极限、Darboux--Bäcklund 变换和 vertex--bond 型可积离散系统；其中变形
          DNLS 的 Lax 表示必须引入非局部变量，并给出六点格点方程的显式波解。
        why_read: >-
          它把 DNLS、reduction group、非交换代数与离散化放在同一框架中，是理解近期
          matrix/non-Abelian DNLS 工作如何从标量 Kaup--Newell 结构扩展出去的直接入口。
      - paper_id: "arxiv:2507.21660"
        role: "missed-recent"
        homepage_rank: 2
        what_it_does: >-
          为七类具有 Lax 表示的 non-Abelian DNLS 构造与 reduction group 相容的线性和
          二次 Darboux 矩阵，得到 Volterra、Ablowitz--Ladik、Merola--Ragnisco--Tu 与
          relativistic Toda 型微分差分系统，并用 quasideterminant 分析二次矩阵的分解。
        why_read: >-
          这篇文章提供了上一条近期工作的直接技术上游：它把 Darboux transformation
          当作可积格点动力学本身，而不只是生成显式解的 dressing 工具。
      - paper_id: "doi:10.1088/0305-4470/35/36/310"
        role: "journal-version"
        homepage_rank: 3
        what_it_does: >-
          通过 Lax pair 为 Kaup--Newell、Chen--Lee--Liu 和 Gerdjikov--Ivanov 三类 DNLS
          构造保持复共轭约化与双 Hamilton 结构的可积离散化，并由变量变换和约化导出
          matrix NLS、coupled NLS、Hirota、Sasa--Satsuma 等多类格点系统。
        why_read: >-
          它是今天两篇 non-Abelian/noncommutative 工作反复依赖的经典基线，可用于核对
          各类 DNLS 离散系统的 Lax 结构、约化关系和连续极限。
      - paper_id: "doi:10.1111/sapm.12287"
        role: "group-adjacent"
        what_it_does: >-
          在 dn、cn 与带相位调制的椭圆背景上用 Darboux transformation 构造 focusing NLS
          多 breather，并以 theta 行列式表示；同时用 squared eigenfunctions 求线性化谱，
          再在分支点极限下得到高阶 rogue waves。
        why_read: >-
          这篇 Liming Ling 合作论文把有限带背景、调制不稳定性、Darboux 极限与 rogue wave
          统一起来，为当前 Fokas--Lenells 椭圆背景局域解提供非常具体的比较对象。

  - date: "2026-07-12"
    week: "2026-W28"
    summary: >-
      本期按“方程结构—带孤子 IST—DNLS soliton resolution—多分量精确解”组织，
      补齐 Fokas--Lenells 与 derivative-NLS 方向的基础阅读链。
    entries:
      - paper_id: "doi:10.1088/1361-6544/abcc4b"
        role: "journal-version"
        homepage_rank: 1
        what_it_does: >-
          从不可约 Hermitian symmetric spaces 出发构造多分量 Fokas--Lenells 方程，
          给出相应 Lax 表示、双 Hamilton 结构，并系统讨论局部、非局部约化及经典系列实例。
        why_read: >-
          它为近期椭圆背景 Fokas--Lenells 精确解提供结构层面的上游框架，也把多分量 FL
          与 DNLS 型二次谱问题、对称空间分类和 reduction group 联系起来。
      - paper_id: "arxiv:2210.08417"
        role: "method-background"
        homepage_rank: 2
        what_it_does: >-
          对含有限个孤子的 Fokas--Lenells 初值问题证明全局解存在性；核心工具是可添加或移除
          指定离散谱数据的改造 Darboux transformation，再将问题约化到无孤子 IST 情形。
        why_read: >-
          这篇文章具体展示了 Darboux 变换如何作为谱数据管理工具服务于严格适定性证明，
          可与 coupled NLS 长时渐近中移除离散谱的做法直接对照。
      - paper_id: "arxiv:1905.02866"
        role: "review-map"
        homepage_rank: 3
        what_it_does: >-
          综述 DNLS 在加权 Sobolev 空间中的全局适定性与长时行为，说明 Zhou 方法如何处理
          spectral singularities，并总结一般亮孤子数据下的 soliton resolution 与渐近稳定性。
        why_read: >-
          它提供一张从 direct/inverse scattering、谱奇点控制到 nonlinear steepest descent
          和 soliton resolution 的紧凑路线图，适合统摄近期 DNLS soliton-gas 与渐近工作。
      - paper_id: "doi:10.1088/1751-8113/43/43/434023"
        role: "group-adjacent"
        what_it_does: >-
          为两分量 derivative NLS 构造可迭代的 Darboux transformation，并由此得到紧凑的
          N-soliton 表示，展示多分量导数型系统中离散谱迭代的基本代数结构。
        why_read: >-
          这是 Liming Ling 早期多分量 DNLS 工作中的直接方法文献，可与后续 generalized
          Darboux、coupled GI 逆散射和 coupled NLS 精确解研究并读。

  - date: "2026-07-11"
    week: "2026-W28"
    summary: >-
      本期关注 coupled NLS 与 DNLS 的 RHP 表述，以及 finite-gap 退化和
      soliton gas 之间的联系。
    entries:
      - paper_id: "arxiv:2504.21315"
        role: "group-adjacent"
        homepage_rank: 1
        what_it_does: >-
          从 focusing coupled NLS 的 3×3 谱问题建立 RHP，通过 Darboux
          transformation 移除离散谱，并用 Deift--Zhou 非线性 steepest descent
          得到加权 Sobolev 初值下的长时展开和孤子分解。
        why_read: >-
          直接连接 Liming Ling 课题组的 coupled NLS、RHP、Darboux 变换和长时渐近方向。
      - paper_id: "arxiv:0808.1534"
        role: "method-background"
        homepage_rank: 2
        what_it_does: >-
          用统一变换处理 Kaup--Newell 型 DNLS 半线问题，将初值谱函数和边界谱函数
          共同编码进矩阵 RHP，并由 global relation 约束边界数据。
        why_read: >-
          它是从整线 DNLS IST 过渡到初边值谱分析、边界兼容性和半线 RHP 的基础文献。
      - paper_id: "doi:10.1088/1361-6544/accfdf"
        role: "journal-version"
        homepage_rank: 3
        what_it_does: >-
          推导高亏格 theta 函数的部分退化公式，并将 KdV 多孤子解表示为平移椭圆背景
          与行列式孤子部分，同时得到椭圆背景上的散射核和 soliton-gas 色散关系。
        why_read: >-
          它把有限带几何、退化极限、非零背景散射和 soliton gas 放在同一具体模型中。
      - paper_id: "arxiv:2304.06541"
        role: "review-map"
        what_it_does: >-
          综述稀疏与稠密 soliton gas、IST、有限带势的热力学极限、广义 Gibbs 系综、
          广义流体力学、数值方法和实验实现。
        why_read: >-
          适合作为领域地图，用来核对 soliton gas 的术语、主要方法、实验背景和开放问题。

  - date: "2026-07-10"
    week: "2026-W28"
    summary: >-
      本期混合近期渐近结果、soliton-gas 统计工作、离散与多分量系统，以及两篇
      课题组相关的 Darboux 方法旧文。
    entries:
      - paper_id: "arxiv:2602.13589"
        role: "journal-version"
        homepage_rank: 1
        what_it_does: >-
          对有限亏格代数几何背景上的 defocusing NLS 应用非线性 steepest descent，
          区分四个时空区域，并以 Painlevé XXXIV 描述两个过渡区的次阶渐近。
        why_read: >-
          它展示了有限带背景、RHP 变形和 Painlevé 局部模型如何在长时渐近中衔接。
      - paper_id: "arxiv:2605.06306"
        role: "recent"
        what_it_does: >-
          为 focusing NLS 半经典随机波场提出 soliton-gas resolution，将谱态密度与
          波场强度统计联系起来，并与数值模拟比较。
        why_read: >-
          可作为随机 IST、积分湍流和 soliton-gas 统计方向的近期入口。
      - paper_id: "arxiv:2606.05123"
        role: "adjacent"
        what_it_does: >-
          在非零背景下构造 defocusing 标量与耦合 Ablowitz--Ladik 系统的周期 breather、
          离散 Akhmediev 型 breather 及其 rogue-wave 极限。
        why_read: >-
          为多分量离散可积系统中的 breather 与 rogue wave 提供一组可比较的显式解。
      - paper_id: "arxiv:2606.22808"
        role: "adjacent"
        what_it_does: >-
          给出调和维数约化条件，将一类 (3+1) 维多分量 NLS 系统精确约化到
          (1+1) 维可积层级，并把 Manakov 型解提升回高维模型。
        why_read: >-
          它提供了从低维可积解到高维多分量波场的精确构造机制。
      - paper_id: "doi:10.1111/j.1467-9590.2012.00568.x"
        role: "group-adjacent"
        homepage_rank: 2
        what_it_does: >-
          构造 Kaup--Newell/DNLS 的两类广义 Darboux transformation，并给出高阶孤子、
          重复极点解和高阶 rogue-wave 公式。
        why_read: >-
          是理解 DNLS 多重谱点、极限过程和高阶精确解构造的直接方法背景。
      - paper_id: "doi:10.1016/j.cnsns.2015.08.023"
        role: "group-adjacent"
        what_it_does: >-
          通过统一 Darboux transformation 构造混合耦合 NLS 的非零背景解，分类
          breather、dark soliton 和 rogue wave，并分析不同解型之间的相互作用。
        why_read: >-
          连接课题组的多分量 NLS、非零背景精确解和解型分类工作。

  - date: "2026-07-09"
    week: "2026-W28"
    summary: >-
      本期以 Fokas--Lenells、DNLS soliton gas、coupled GI 逆散射和 coupled NLS
      breather 稳定性为主，并补充有限带估计与多分量离散化。
    entries:
      - paper_id: "arxiv:2607.06409"
        role: "recent"
        homepage_rank: 1
        what_it_does: >-
          使用 Lax pair、Weierstrass 椭圆函数和 N-fold Darboux--Bäcklund transformation
          构造 Fokas--Lenells 方程的椭圆背景局域解，并研究其传播渐近结构。
        why_read: >-
          与当前 DNLS/Fokas--Lenells、椭圆背景和 Darboux 构造方向高度重合。
      - paper_id: "arxiv:2607.04756"
        role: "adjacent"
        what_it_does: >-
          构造多分量 short-pulse equation 的全离散可积系统，并保持相应的双线性与
          孤子结构。
        why_read: >-
          可作为 complex short pulse、vector soliton 和离散可积模型的外围方法材料。
      - paper_id: "arxiv:2607.01348"
        role: "recent"
        what_it_does: >-
          给出 modified KdV 有限带解振幅的锐上界，把代数几何解的谱数据与定量振幅估计联系起来。
        why_read: >-
          补充有限带研究中从显式构造走向定量控制的一条线索。
      - paper_id: "arxiv:2606.24435"
        role: "missed-recent"
        homepage_rank: 2
        what_it_does: >-
          从纯 N-soliton 的 meromorphic RHP 出发研究 DNLS soliton gas 的连续极限和长时渐近，
          使用 RHP、∂̄ 方法和 theta 函数描述不同渐近区域。
        why_read: >-
          直接位于 DNLS、soliton gas、RHP 和长时渐近的交叉点，是当前优先级很高的补读。
      - paper_id: "arxiv:2605.28856"
        role: "missed-recent"
        what_it_does: >-
          建立 coupled Gerdjikov--Ivanov 线性系统的 direct/inverse scattering，讨论 Jost
          solutions、散射系数、束缚态以及 Marchenko 型积分方程。
        why_read: >-
          为 coupled GI 和 DNLS system III 的完整 IST 框架提供直接的谱分析材料。
      - paper_id: "doi:10.1016/j.aim.2026.110961"
        role: "group-adjacent"
        what_it_does: >-
          通过 squared eigenfunctions、Krein signature 和 Lyapunov 方法研究 coupled NLS
          breathers 的谱结构与非线性轨道稳定性。
        why_read: >-
          是课题组相关的 coupled NLS、breather 和稳定性方向中的核心正式论文。
