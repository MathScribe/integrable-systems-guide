frontier:
  checked_through: '2026-07-20'
  entries:
  - paper_id: arxiv:2607.15132
    signal_date: '2026-07-16'
    signal_type: new-preprint
    week: 2026-W29
    arxiv_categories:
    - quant-ph
    - cond-mat.stat-mech
    structure_tags:
    - Bethe ansatz
    - quantum integrability
    summary: 论文把量子多体疤痕的周期轨道图景放入可积 XYZ/XXZ 自旋链，定位支撑疤痕态的 Bethe 态，并解释近等间距能级塔的来源。结果把通常分别讨论的疤痕动力学、经典周期轨道和 Bethe 代数结构连接起来。
    main_result: 作者发展能量分辨的周期轨道搜索，在整个 XYZ/XXZ 谱中追踪疤痕轨道及其量子本征态。支撑这些态的 Bethe 根具有共同的 string core，并由零动量 magnon pairs 修饰；这一结构可以直接重构疤痕本征态及其能级塔。论文还加入横场破坏可积性，检验相关周期轨道对动力学的控制能否延续。
    integrable_structure: Bethe ansatz 提供本征态的量子数与根构型，Bethe equations 中零动量 magnon pairs 的解耦给出能级塔间距的解析解释。可积链因此不是背景模型，而是把轨道结构翻译成微观本征态结构的关键工具。
    innovation: 论文给出量子疤痕与 Bethe 根构型之间可计算的对应，并从 Bethe equations 解释能级塔，而不只是在可积模型中数值观察异常态。对弱破缺可积性的延伸还显示，这一微观结构能够组织邻近非可积动力学。
  - paper_id: arxiv:2607.15013
    signal_date: '2026-07-16'
    signal_type: new-preprint
    week: 2026-W29
    arxiv_categories:
    - math-ph
    structure_tags:
    - Pfaffian
    - Bäcklund transformation
    summary: 论文引入适用于非交换情形的 quasi-Pfaffian，并由其 Sylvester identity 构造新的 Sylvester--Moutard transformation。该变换可为 Novikov--Veselov、二维 sine-Gordon 等 Moutard 型可积系统生成解。
    main_result: 作者先建立 quasi-Pfaffian 的代数定义和 Sylvester identity，再把这一恒等式组织成可迭代的 Sylvester--Moutard transformation。论文说明该变换如何作用于 Moutard 可变换系统，并给出 Novikov--Veselov 方程和二维 sine-Gordon 方程等例子，同时梳理经典 Moutard transformation 在 quasi-Pfaffian 表示下的性质。
    integrable_structure: quasi-Pfaffian 承担非交换 Pfaffian 的角色，Sylvester identity 保证多步变换能够以封闭代数形式表示。Moutard transformation 则把这一代数恒等式转化为二维谱问题及相应可积方程的解生成机制。
    innovation: 新增内容是 quasi-Pfaffian 结构及由它导出的 Sylvester--Moutard transformation，而非把既有 determinant 公式改写符号。它为非交换或矩阵值二维可积系统提供了一种新的变换与解表示工具。
  - paper_id: doi:10.1007/s10955-026-03663-6
    signal_date: '2026-07-16'
    signal_type: journal-publication
    week: 2026-W29
    arxiv_categories:
    - math-ph
    - hep-th
    structure_tags:
    - 2D Toda hierarchy
    - Riemann--Hilbert problem
    summary: 论文构造带两个 HCIZ 因子的 Hermitian Gaussian matrix model，使有限维本征值分布精确对应任意起点和终点重数的 non-intersecting Brownian bridges。它把路径模型、矩阵模型和 2D Toda/Riemann--Hilbert 结构放进同一有限维框架。
    main_result: 作者从多起点、多终点非相交 Brownian bridges 的 Karlin--McGregor 密度出发，构造一个双 HCIZ 修饰的 Gaussian matrix ensemble，并证明两者的本征值联合分布完全一致。随后利用 mixed multiple orthogonal polynomials 描述相关相关核，并推导矩阵积分满足的 Schwinger--Dyson 与 Virasoro 型恒等式。
    integrable_structure: 模型连接 Karlin--McGregor law、mixed multiple orthogonal polynomials、Riemann--Hilbert problem、2D Toda
      tau-function 和 Schwinger--Dyson/Virasoro identities。
    innovation: 补出了多起点、多终点 Brownian bridge 问题此前缺失的显式矩阵模型来源，并在有限 \(n\) 层面统一路径分布、谱模型和可积层级结构。
  - paper_id: arxiv:2607.13773
    signal_date: '2026-07-15'
    signal_type: new-preprint
    week: 2026-W29
    arxiv_categories:
    - nlin.PS
    - nlin.SI
    structure_tags:
    - Darboux transformation
    - topological vector potential
    summary: 作者研究两分量 Fokas--Lenells 模型在平面波背景上的多峰--多谷孤子，系统分类基本形态，并把构造推广到任意峰谷组合。论文还通过弱白噪声数值实验检查传播稳健性，并用复平面中的强度零点和极点描述一种拓扑特征。
    main_result: 论文面向双折射光纤中的两分量 Fokas--Lenells 方程，研究平面波背景上如何形成亮峰、暗谷及其混合局域结构。作者通过相图对基本解进行系统分类，进一步构造高阶配置以及任意 \(K\)-hump、\(M\)-valley 和混合峰谷结构。除解析构造外，论文还加入弱白噪声扰动下的数值模拟，用来检查这些结构在传播过程中的稳健性。
    integrable_structure: Darboux transformation 用于从平面波背景生成基本解和高阶精确解，相图用于区分不同参数区域中的峰谷形态。拓扑分析考察复平面内强度函数的零点和极点，并借助 topological vector potential 描述对应的 virtual monopole field，从而把解析解的零极点结构与拓扑表征联系起来。
    innovation: 论文把有限的低阶形态推进为任意 multihump--multivalley 组合的统一构造，并系统组织两分量模型中的峰谷解族。进一步的拓扑分析提出强度零点和极点对 virtual monopole field 等量贡献的结论；创新集中在任意结构的统一构造及其拓扑解释，而不是 Darboux transformation 本身。
  - paper_id: arxiv:2607.12142
    signal_date: '2026-07-13'
    signal_type: new-preprint
    week: 2026-W29
    arxiv_categories:
    - hep-th
    - math-ph
    structure_tags:
    - Chern--Simons theory
    - Lax pair
    summary: 论文把从四维半全纯 Chern--Simons theory 构造二维可积场论的同调方法变成可执行计算。通过显式 homotopy transfer，作者恢复带 Wess--Zumino 项的 principal chiral model 作用量及其标准 Lax connection。
    main_result: 作者为带除子扭曲的 Dolbeault complexes 构造显式 strong deformation retracts，使“积分掉谱曲线”对应的 cyclic \(L_\infty\)-algebra homotopy transfer 可以逐项计算。对 \(C=\mathbb{CP}^1\) 上与带 Wess--Zumino 项 principal chiral model 对应的亚纯一形式，转移后的 Maurer--Cartan action 可重求和为标准二维作用量，转移后的场依赖量则恢复通常的 Lax connection。
    integrable_structure: 四维 Chern--Simons theory 编码谱曲线、奇点和边界条件；cyclic \(L_\infty\) homotopy transfer 把这些数据下降为二维相互作用与 Lax connection。可积性由高维规范理论的同调结构产生，而不是事后为二维模型补写 Lax pair。
    innovation: 工作补上了这套高维构造中“原则上存在但难以计算”的环节，给出可复用的显式 deformation retract 与转移算法。它使由 4d Chern--Simons 系统地产生和核验二维可积场论成为实际计算流程。
  - paper_id: arxiv:2607.12339
    signal_date: '2026-07-14'
    signal_type: new-preprint
    week: 2026-W29
    arxiv_categories:
    - nlin.PS
    structure_tags:
    - inverse scattering
    - inverse problem
    summary: 推导 soliton eigenvalue response functions，并建立由输出本征值偏移反演未知脉冲扰动的积分方程，包含含噪重构测试。可积谱数据直接参与控制和反问题，形成 soliton tomography
      的具体方法框架。
    main_result: 作者研究传播过程中局域扰动如何改变 NLS 孤子的离散本征值，推导每个本征值对时空扰动的 response function。正问题给出已知扰动造成的谱偏移；逆问题则把末端测得的多组本征值偏移写成积分方程，用来恢复未知脉冲。数值实验进一步检查有限采样和噪声下的重构稳定性。
    integrable_structure: 将 IST 离散本征值从精确解参数和守恒数据转化为可测量、可操控的观测坐标。
    innovation: 可积谱数据直接参与控制和反问题，形成 soliton tomography 的具体方法框架。
  - paper_id: doi:10.1007/JHEP07(2026)123
    signal_date: '2026-07-13'
    signal_type: journal-publication
    week: 2026-W29
    arxiv_categories: []
    structure_tags:
    - Yang--Baxter equation
    - Chern--Simons theory
    summary: 从四维 Chern--Simons theory 推导 Breitenlohner--Maison sigma model 及其高秩推广的可积形变。为描述四维广义相对论平稳轴对称扇区的 sigma model 建立统一的可积形变来源，把引力模型、Chern--Simons
      构造和 Yang--Baxter deformation 直接连接起来。
    main_result: 作者从定义在二维时空与谱曲线乘积上的四维 Chern--Simons action 出发，选择适合 Breitenlohner--Maison 模型的奇点与边界数据，推导二维 sigma model。改变缺陷和边界条件后得到两族可积形变，并说明其高秩推广及与平稳轴对称 Einstein reduction 的关系。
    integrable_structure: 通过改变 4d Chern--Simons 边界条件和作用量，分别得到与 homogeneous 和 inhomogeneous classical Yang--Baxter equations
      对应的形变。
    innovation: 为描述四维广义相对论平稳轴对称扇区的 sigma model 建立统一的可积形变来源，把引力模型、Chern--Simons 构造和 Yang--Baxter deformation 直接连接起来。
  - paper_id: doi:10.1007/JHEP07(2026)120
    signal_date: '2026-07-13'
    signal_type: journal-publication
    week: 2026-W29
    arxiv_categories: []
    structure_tags:
    - mKdV hierarchy
    - inverse scattering
    summary: 从三维引力的 Chern--Simons 表述和手征边界条件导出 potential mKdV hierarchy 及 eigenfunction-forced KdV dynamics。将自洽本征函数驱动的强迫 KdV
      与 AdS\(_3\) 边界动力学统一起来，同时给出孤子和辐射两类扇区的可积分析。
    main_result: 论文在三维 AdS 引力的 Chern--Simons formulation 中选取手征边界条件，使边界场满足 potential mKdV hierarchy；加入自洽本征函数源后得到 eigenfunction-forced KdV flows。作者分别构造无反射的多孤子扇区与含连续谱的辐射扇区，并比较它们的长时间行为。
    integrable_structure: 反射为零扇区由 inverse scattering 和 Gelfand--Levitan--Marchenko 方法求解，有辐射扇区表现出普适色散衰减。
    innovation: 将自洽本征函数驱动的强迫 KdV 与 AdS\(_3\) 边界动力学统一起来，同时给出孤子和辐射两类扇区的可积分析。
  - paper_id: arxiv:2607.10870
    signal_date: '2026-07-12'
    signal_type: new-preprint
    week: 2026-W28
    arxiv_categories:
    - nlin.SI
    structure_tags:
    - integrable geometry
    - Darboux transformation
    summary: 论文提出一种几何 folding 框架，把 shifted nonlocal NLS 与 mKdV 的已知精确解重新参数化为 regular loop、oscillating loop 和 singular folded profiles。它关注的不是再求一组孤子，而是何种空间参数化会把一维精确解折叠成不同几何波形。
    main_result: 作者为精确解引入非单调空间参数映射，并给出 folding map 导数变号时发生折叠的充分条件。将这一框架应用到多种 shifted nonlocal NLS/mKdV 的一、二孤子后，论文系统比较形变参数和解参数怎样控制规则环、振荡环与奇异折叠形态，并区分波形变化来自场值还是空间参数化。
    integrable_structure: 输入仍是非局部约化下的精确孤子解；folding map 在不改变这些解满足的可积方程关系的前提下重组空间坐标。方法因此把非局部可积解的解析参数与曲线几何直接对应起来。
    innovation: 新方法用一条可检验的导数变号条件统一产生多类 loop-type profile，避免依赖 \((2+1)\) 维变量分离或 hodograph transformation。它提供的是精确解几何呈现的通用机制，而不是某个参数点的新图形。
  - paper_id: arxiv:2607.10954
    signal_date: '2026-07-12'
    signal_type: new-preprint
    week: 2026-W28
    arxiv_categories:
    - nlin.PS
    - nlin.SI
    structure_tags: []
    summary: 构造由不稳定模触发、但峰值处由线性稳定谐波主导的 exact vector Akhmediev breather。揭示标量 MI 直觉在多分量系统中的失效，并把稳定频率的自发主导机制定量归因于 four-wave mixing。
    main_result: 作者在 Manakov 平面波背景上解析构造 vector Akhmediev breather，并找出其存在参数窗：初始扰动只含 modulation-instability gain band 内的不稳定谐波，但演化到峰值时，位于线性稳定间隙的谐波反而占主导。直接数值传播从简单连续波扰动出发复现这一谱能量转移。
    integrable_structure: Manakov 系统的精确 breather 和多分支 modulation-instability 谱结构。
    innovation: 揭示标量 MI 直觉在多分量系统中的失效，并把稳定频率的自发主导机制定量归因于 four-wave mixing。
  - paper_id: arxiv:2607.09333
    signal_date: '2026-07-10'
    signal_type: new-preprint
    week: 2026-W28
    arxiv_categories:
    - nlin.SI
    structure_tags:
    - integrable discretization
    summary: 构造四族 fully discrete GI models 和四族 higher-order GI lattice models，得到 \(N\)-soliton 与 multiple-pole 解，并通过连续极限恢复连续
      GI/hGI 方程。
    main_result: 作者从 Sylvester matrix equations 出发，在两个离散方向选取不同色散关系，导出四类 fully discrete Gerdjikov--Ivanov equations 及四类高阶对应格点。对局部和非局部约化分别给出 Cauchy-matrix 解；对角谱矩阵产生 \(N\)-soliton，Jordan blocks 产生 multiple-pole solutions。半连续与全连续极限恢复相应 GI/hGI flows。
    integrable_structure: Sylvester/Cauchy matrix scheme、离散色散关系、局部/非局部约化和 Jordan-block 谱矩阵。
    innovation: 离散模型、约化、multiple-pole 解和连续极限形成完整的新离散可积体系。
  - paper_id: arxiv:2607.09180
    signal_date: '2026-07-10'
    signal_type: new-preprint
    week: 2026-W28
    arxiv_categories: []
    structure_tags:
    - Yang--Baxter equation
    - tau function
    summary: 建立 dispersionless modified DKP hierarchy 与 Yang--Baxter equation 的等价关系。给出经典可积层级与量子可积核心代数结构之间的直接等价桥梁。
    main_result: 论文从 modified DKP hierarchy 的 dispersionless Hirota relations 出发，重排生成函数与谱参数，证明所得函数恒等式等价于 Baxter eight-vertex \(R\)-matrix 满足的 Yang--Baxter equation。作者同时说明层级的 tau-function 数据怎样进入椭圆参数化，使两侧变量和函数逐项对应。
    integrable_structure: tau/Hirota--Miwa 结构和 Baxter eight-vertex \(R\)-matrix。
    innovation: 给出经典可积层级与量子可积核心代数结构之间的直接等价桥梁。
  - paper_id: arxiv:2607.08536
    signal_date: '2026-07-09'
    signal_type: new-preprint
    week: 2026-W28
    arxiv_categories:
    - math.PR
    - math-ph
    structure_tags:
    - integrable probability
    summary: 论文补全 Laguerre \(\beta\)-ensemble 下边缘的软边极限图景：当参数 \(a_n\to\infty\) 且 \(a_n/n\to0\) 时，适当缩放后的最低本征值过程收敛到 \(\mathrm{Airy}_\beta\)。部分参数区间还得到随机三对角算子逆的算子级收敛。
