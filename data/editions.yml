# Recommendation history and editorial annotations.
# Bibliographic facts live in data/papers.yml; this file records when and why a
# paper was featured. Roles are intentionally stable across editions.

weeks:
  - id: "2026-W29"
    date_range: "2026-07-13 至 2026-07-19"
    summary: >-
      本周从 non-Abelian DNLS、fully discrete Gerdjikov--Ivanov、Manakov vector breathers、
      shifted nonlocal reductions 与谱数据操控，推进到 Fokas--Lenells 的散射渐近、
      多分量 KP--Toda 约化、coupled rogue-wave 通式及 Okamoto 图案分解。
    tags:
      - "DNLS"
      - "Gerdjikov--Ivanov equation"
      - "Manakov system"
      - "Fokas--Lenells equation"
      - "nonzero boundary conditions"
      - "inverse scattering"
      - "Riemann--Hilbert problem"
      - "nonlinear steepest descent"
      - "soliton resolution"
      - "half-line"
      - "Darboux transformation"
      - "spectral data"
      - "KP--Toda reduction"
      - "rogue-wave patterns"
      - "Okamoto polynomials"
  - id: "2026-W28"
    date_range: "2026-07-06 至 2026-07-12"
    summary: >-
      本周集中在 DNLS、coupled NLS、Riemann--Hilbert 渐近、有限带退化与
      soliton gas，同时补入 Fokas--Lenells、Darboux transformation 和稳定性材料。
    tags:
      - "DNLS"
      - "coupled NLS"
      - "Riemann--Hilbert problem"
      - "finite-gap"
      - "soliton gas"
      - "Fokas--Lenells"

editions:
  - date: "2026-07-19"
    week: "2026-W29"
    summary: >-
      本期按“多分量 KP--Toda 约化—coupled FL 高阶 rogue-wave 通式—Okamoto 多项式控制的
      图案渐近—n-fold Darboux 解族基线”组织，集中比较行列式结构、谱分支重数与极端波形分解。
    entries:
      - paper_id: "doi:10.1016/j.physd.2025.134706"
        role: "journal-version"
        homepage_rank: 1
        what_it_does: >-
          从 KP--Toda hierarchy 的双线性方程与 Gram determinant 解出发约化多分量
          Fokas--Lenells 系统，并由 discrete KP 的 Miwa transformation 重建双线性结构；
          给出 dark solitons、Akhmediev/Kuznetsov--Ma 型 breathers 及三、四重 resonant breathers。
        why_read: >-
          它把 coupled FL 的显式波形放回可扩展到任意分量的层级约化框架，特别适合对照
          Darboux 方法中的谱参数构造与 KP reduction 中的 determinant/共振条件。
      - paper_id: "doi:10.1016/j.physd.2024.134111"
        role: "group-adjacent"
        homepage_rank: 2
        what_it_does: >-
          对 coupled Fokas--Lenells 方程构造高阶 rogue-wave determinant formula，并分析
          三重分支点生成的解在大内部参数极限下如何分裂成若干一阶外部 rogue waves 与较低阶内部核心；
          外部位置和内部阶数由 Okamoto polynomial hierarchies 控制。
        why_read: >-
          这是 Liming Ling 课题组相关的正式版本，把“高阶显式解”推进为可预测的图案渐近；
          对理解大参数分解、特殊多项式零点与 rogue-wave 几何之间的联系最直接。
      - paper_id: "doi:10.1098/rspa.2018.0806"
        role: "backlog-core"
        homepage_rank: 3
        what_it_does: >-
          构造非递归 Darboux transformation，分别处理谱特征方程的 double-root 与 triple-root 情形，
          得到 coupled Fokas--Lenells 的一般 n 阶有理 rogue waves，并展示共存 rogue waves、
          anomalous Peregrine solitons 以及包含完整背景场参数的基本和二阶动力学。
        why_read: >-
          它是三重分支点 rogue-wave 族的通式基线，可用于辨认 2024 年图案分解中哪些结构来自
          分支重数、哪些来自大参数极限，并补足一般 n 阶构造而非只看若干低阶图形。
      - paper_id: "doi:10.1016/j.nonrwa.2016.06.006"
        role: "method-background"
        what_it_does: >-
          对 vector/coupled Fokas--Lenells 系统建立 n-fold Darboux transformation，构造高阶
          solitons、breathers 与 rogue waves，并讨论这些孤立波解随参数变化的动力学特征。
        why_read: >-
          这是本期最早的统一 Darboux 解族基线；先读它能看清后续非递归公式、分支点退化和
          Okamoto 图案分析是在怎样的 n-fold dressing 框架上逐步增加结构。

  - date: "2026-07-18"
    week: "2026-W29"
    summary: >-
      本期按“非零背景 direct/inverse scattering—全线无孤子辐射—含离散谱 soliton resolution—
      半线初边值渐近”组织，形成 Fokas--Lenells 从谱问题建立到 nonlinear steepest descent 的阅读链。
    entries:
      - paper_id: "doi:10.2991/jnmp.k.200922.003"
        role: "journal-version"
        homepage_rank: 1
        what_it_does: >-
          在非零边界条件下分析 Fokas--Lenells Lax pair 的 Jost solutions 与散射矩阵，
          给出解析性、对称性以及 k→0 和 k→∞ 的渐近结构；据此建立广义 Riemann--Hilbert
          问题、重构公式，并在 reflectionless 情形求得 N-soliton 解。
        why_read: >-
          这是非零背景 FL 谱分析的正式期刊基线，可把平面波或椭圆背景上的 Darboux 精确解
          放回完整的 direct/inverse scattering 框架，并明确离散谱、连续谱与重构之间的关系。
      - paper_id: "doi:10.1016/j.jde.2015.02.046"
        role: "backlog-core"
        homepage_rank: 2
        what_it_does: >-
          对衰减初值的全线 Fokas--Lenells Cauchy 问题，在无离散谱情形应用 Deift--Zhou
          nonlinear steepest descent，得到纯辐射解的主阶长时渐近，其衰减尺度为 t^{-1/2}。
        why_read: >-
          它把连续谱贡献单独剥离出来，是理解后续含孤子渐近中辐射项、相位修正和局部模型的
          最干净起点，也便于与 DNLS、coupled NLS 的纯辐射 RHP 分析逐项比较。
      - paper_id: "doi:10.1016/j.jde.2021.11.045"
        role: "journal-version"
        homepage_rank: 3
        what_it_does: >-
          对支持 bright solitons 的一般 Sobolev 初值，在固定时空锥中用 dbar nonlinear
          steepest descent 分离离散谱与连续谱：主项为 N(I)-soliton，辐射为 O(t^{-1/2})，
          总余项控制到 O(t^{-3/4})，并处理 k=0 谱奇点和四个驻相点。
        why_read: >-
          这篇正式论文把 2015 年纯辐射基线推进到真正的 soliton resolution，展示 FL 特有的
          谱奇点和驻相几何如何改变标准 NLS/DNLS steepest-descent 模板。
      - paper_id: "arxiv:1710.06563"
        role: "method-background"
        what_it_does: >-
          对半线上的 Schwartz 类 Fokas--Lenells 初边值问题建立相应 Riemann--Hilbert 表述，
          并用 Deift--Zhou nonlinear steepest descent 推导 t→∞ 的长时渐近。
        why_read: >-
          它把同一套渐近方法从整线散射推广到受边界约束的谱问题，适合作为研究 FL/DNLS
          半线问题、边界谱数据和初边值相容性的直接方法背景。

  - date: "2026-07-17"
    week: "2026-W29"
    summary: >-
      本期按“两分量 Fokas--Lenells 平面波新解族—matrix/vector Darboux 结构—
      课题组 coupled FL 基线—本征值响应函数与 soliton tomography—实验正式版本”组织，
      把离散谱从生成精确解的参数提升为可操控、可反演的观测坐标。
    entries:
      - paper_id: "arxiv:2607.13773"
        role: "recent"
        homepage_rank: 1
        what_it_does: >-
          对双折射光纤的两分量 Fokas--Lenells 方程用 Darboux transformation 构造
          平面波背景上的 multihump-multivalley soliton families；用相图分类基本解，
          推广到任意多峰多谷与高阶构型，并用弱白噪声数值演化检验鲁棒性。
        why_read: >-
          它把当前 Fokas--Lenells、两分量系统和非零背景精确解方向结合起来；
          复平面中强度零点与极点共同决定 virtual monopole field 的观察，也为
          “谱参数—波形拓扑”之间的关系提供了一个可计算的新例子。
      - paper_id: "arxiv:2607.12339"
        role: "recent"
        homepage_rank: 2
        what_it_does: >-
          为 sech 型 NLS 脉冲推导 soliton eigenvalue response functions，分析瞬时可控扰动
          如何移动离散本征值，并建立由传播末端测得的本征值偏移反演未知波形畸变的积分方程；
          文中比较不同重构区间并测试含噪数据下的稳定性。
        why_read: >-
          它把 IST 离散谱从守恒量和解参数转化为传感与 tomography 的观测量，
          对理解谱数据在可控扰动、非线性传播和反问题之间如何传递尤其有价值。
      - paper_id: "doi:10.1103/PhysRevLett.134.193804"
        role: "journal-version"
        homepage_rank: 3
        what_it_does: >-
          在 strongly overlapping 多孤子脉冲中引入 eigenvalue response functions，
          并在循环光纤环与 homodyne 测量平台上施加局域相位扰动，选择性改变单个孤子的
          速度和振幅、从复合脉冲中剥离目标孤子，实验结果与 IST 扰动理论定量吻合。
        why_read: >-
          这是 soliton tomography 新论文的正式实验上游：先读它可以看清 response function
          的物理可测性、完整相位—振幅重构要求，以及从“操控本征值”走向“反演扰动源”的新增步骤。
      - paper_id: "arxiv:2508.17534"
        role: "method-background"
        what_it_does: >-
          用 bidifferential calculus 为 Kaup--Newell 层级第一负流的 matrix 版本构造
          vectorial binary Darboux transformation，并将其约化到 matrix Fokas--Lenells 方程；
          在两分量平面波背景上系统生成 breathers、dark solitons、rogue waves 与 beating solitons。
        why_read: >-
          它给今天的新 multihump Fokas--Lenells 解族提供结构化的 matrix/vector dressing 背景，
          便于比较不同 Darboux 参数化如何组织非零背景上的多种波形，而不只逐个验证显式公式。
      - paper_id: "doi:10.1016/j.nonrwa.2017.08.013"
        role: "group-adjacent"
        what_it_does: >-
          从正、负阶 vector Kaup--Newell hierarchy 建立多 Hamilton 结构与无穷守恒律，
          识别首个非平凡负流为 coupled Fokas--Lenells 方程，并以 generalized Darboux
          transformation 构造 bright-dark、dark-anti-dark、breather-like 及多孤子解和渐近行为。
        why_read: >-
          这是 Liming Ling 合作工作的正式期刊基线，把 coupled FL 的层级结构、守恒律、
          平面波背景解型分类与多孤子渐近统一起来，可作为今天新两分量解族最直接的课题组相关参照。

  - date: "2026-07-16"
    week: "2026-W29"
    summary: >-
      本期按“shifted nonlocal NLS/mKdV 的几何折叠—显式孤子基线—shifted nonlocal
      DNLS 约化—非局部 NLS 的谱与 Hamilton 结构”组织。
    entries:
      - paper_id: "arxiv:2607.10870"
        role: "recent"
        homepage_rank: 1
        what_it_does: >-
          把既有 shifted nonlocal NLS 与 mKdV 的一、二孤子解作为参数曲线的场变量，
          通过非单调空间映射构造 loop-type folded profiles；以折叠映射导数变号作为充分条件，
          并分析变形参数和孤子参数如何产生规则、振荡与奇异折叠。
        why_read: >-
          新意不在重新求解方程，而在清楚分离“解的振幅动力学”和“空间参数化几何”；
          这为阅读 loop/foldon 图形提供判别框架，也直接指向其依赖的 shifted-reduction 文献。
      - paper_id: "doi:10.1016/j.physleta.2021.127793"
        role: "journal-version"
        homepage_rank: 2
        what_it_does: >-
          为 shifted nonlocal NLS 与 mKdV 方程给出一、二孤子解，并系统讨论这些解的
          奇异结构和参数依赖；今天的新论文正是把这些显式解重新解释为可折叠的参数波形。
        why_read: >-
          这是新结果最直接的正式期刊上游，可用于区分来自方程与约化的结构，和后续
          folding map 对空间坐标的再参数化效应。
      - paper_id: "arxiv:2110.01047"
        role: "adjacent"
        homepage_rank: 3
        what_it_does: >-
          从可积 coupled Kundu-type system 的局部与 shifted nonlocal reductions 出发，
          对 Chen--Lee--Liu、Gerdjikov--Ivanov 和 Kaup--Newell 三类 DNLS 型方程用
          Hirota 双线性法构造一、二孤子解。
        why_read: >-
          它把 shifted nonlocal 主题直接拉回 DNLS 三分支，便于比较空间/时间平移约化
          怎样改变熟悉的 CLL、GI 与 KN 孤子公式和正则性条件。
      - paper_id: "arxiv:1510.00480"
        role: "method-background"
        what_it_does: >-
          利用 Lax 算子 squared solutions 的完备关系证明一类非局部 NLS 层级的完整可积性，
          描述两类孤子谱、由散射数据参数化的作用角变量，并构造 Hamilton 层级。
        why_read: >-
          它提供显式解论文缺少的谱论底座：非局部约化不仅产生新孤子公式，也会重组
          离散谱对称性、正则解类型和 Hamilton 结构。

  - date: "2026-07-15"
    week: "2026-W29"
    summary: >-
      本期按“稳定频率占主导的新 vector AB—基于线性化本征向量的可控激发—
      非退化 AB 的 MI 存在图—dressing 方法下的 vector breather 分类与相互作用”组织。
    entries:
      - paper_id: "arxiv:2607.10954"
        role: "recent"
        homepage_rank: 1
        what_it_does: >-
          在 Manakov 系统中构造一种由不稳定模激发、但在峰值处由线性稳定谐波占主导的
          精确 vector Akhmediev breather；数值演化表明无需预先播种稳定分量，它会自发出现，
          并将主导机制定量归因于 four-wave mixing。
        why_read: >-
          它直接修正“breather 主频必定位于 MI 增益带内”的标量直觉，把多分量系统的稳定间隙、
          非线性频率转换和可实验观测的峰值谱结构联系起来。
      - paper_id: "arxiv:2606.21301"
        role: "missed-recent"
        homepage_rank: 2
        what_it_does: >-
          针对 focusing Manakov 系统中多个 MI 分支并存的问题，用目标分支的线性化本征向量
          设计初始 Fourier 扰动，使指定 vector Akhmediev breather 以接近百分之百的保真度被选择性激发。
        why_read: >-
          它给出今天新论文的控制论互补面：一篇解释稳定谐波如何被非线性放大，另一篇说明如何从
          线性阶段就选择目标分支，便于区分分支选择与后续 four-wave mixing 的作用。
      - paper_id: "doi:10.1088/0256-307X/39/9/094201"
        role: "journal-version"
        homepage_rank: 3
        what_it_does: >-
          发现 focusing Manakov 方程中的非退化 Akhmediev breather，给出其频率--波数存在图，
          并说明单频调制不稳定性可同时激发三个 AB，其中两个属于非退化分支。
        why_read: >-
          这是理解新结果所需的正式期刊基线：稳定间隙、多个 MI 分支与非退化 AB 的结构在这里
          首次被清楚分离，可用于核对新论文的参数窗口和谱分量解释。
      - paper_id: "arxiv:2211.07014"
        role: "method-background"
        what_it_does: >-
          用 dressing method 构造 Manakov 系统的多 vector-breather 解，分析三类基本 breather、
          碰撞位移、共振融合与衰变，并把不同类型对应到不稳定与稳定色散分支。
        why_read: >-
          它把今天的单个峰值谱现象放回完整的 vector-breather 分类和相互作用图景中，并解释为何
          稳定分支类型通常不从小扰动的 superregular MI 过程中直接出现。

  - date: "2026-07-14"
    week: "2026-W29"
    summary: >-
      本期按“fully discrete GI/hGI—高阶 GI 流的 RHP dressing—经典 GI 的
      Darboux/quasideterminant 精确解”组织，比较三种构造离散系统与高阶谱数据的方法。
    entries:
      - paper_id: "arxiv:2607.09333"
        role: "recent"
        homepage_rank: 1
        what_it_does: >-
          从带两组离散色散关系的 Sylvester 方程出发，构造四族共轭对称的 fully discrete
          Gerdjikov--Ivanov 模型及四族高阶 GI 格点模型；用对角与 Jordan 块谱矩阵给出
          N-soliton 和 multiple-pole 解，并通过两步连续极限恢复连续 GI/hGI 方程。
        why_read: >-
          它直接补上 GI 方程 fully discrete analogue 的空缺，并把 Cauchy matrix、连续极限、
          局部/非局部约化和多重极点放进同一计算框架，是昨天经典 DNLS 离散化链的自然续篇。
      - paper_id: "arxiv:2105.08412"
        role: "method-background"
        homepage_rank: 2
        what_it_does: >-
          对 GI 层级的三阶流建立 Riemann--Hilbert dressing，构造简单零点与 elementary
          high-order zeros 的 soliton matrices，分析单、双孤子的传播与弹性交互，并由极限过程
          得到高阶孤子矩阵。
        why_read: >-
          它提供与 Cauchy matrix/Jordan-block 构造互补的谱方法视角，可直接比较高阶色散如何
          改变速度、方向和振幅，以及高阶零点如何进入 RHP dressing。
      - paper_id: "doi:10.1080/14029251.2015.996438"
        role: "journal-version"
        homepage_rank: 3
        what_it_does: >-
          为标量 GI 方程构造标准 Darboux transformation，并用 quasideterminant 写出迭代解，
          以抛物型解、孤子和 breather 作为显式例子。
        why_read: >-
          这篇正式期刊论文给出最紧凑的 GI Darboux/quasideterminant 基线，便于把今天的新格点
          multiple-pole 公式与连续方程的经典 dressing 计算逐项对照。

  - date: "2026-07-13"
    week: "2026-W29"
    summary: >-
      本期按“近期非交换推广—非 Abelian Darboux 分类—经典 DNLS 离散化—椭圆背景
      breather 与 rogue wave”组织，突出连续系统、Darboux 变换和格点模型之间的结构联系。
    entries:
      - paper_id: "arxiv:2606.10037"
        role: "missed-recent"
        homepage_rank: 1
        what_it_does: >-
          研究 AKNS、Kaup--Newell DNLS 与 Mikhailov--Shabat--Yamilov 变形的非交换推广，
          推导连续极限、Darboux--Bäcklund 变换和 vertex--bond 型可积离散系统；其中变形
          DNLS 的 Lax 表示必须引入非局部变量，并给出六点格点方程的显式波解。
        why_read: >-
          它把 DNLS、reduction group、非交换代数与离散化放在同一框架中，是理解近期
          matrix/non-Abelian DNLS 工作如何从标量 Kaup--Newell 结构扩展出去的直接入口。
      - paper_id: "arxiv:2507.21660"
        role: "missed-recent"
        homepage_rank: 2
        what_it_does: >-
          为七类具有 Lax 表示的 non-Abelian DNLS 构造与 reduction group 相容的线性和
          二次 Darboux 矩阵，得到 Volterra、Ablowitz--Ladik、Merola--Ragnisco--Tu 与
          relativistic Toda 型微分差分系统，并用 quasideterminant 分析二次矩阵的分解。
        why_read: >-
          这篇文章提供了上一条近期工作的直接技术上游：它把 Darboux transformation
          当作可积格点动力学本身，而不只是生成显式解的 dressing 工具。
      - paper_id: "doi:10.1088/0305-4470/35/36/310"
        role: "journal-version"
        homepage_rank: 3
        what_it_does: >-
          通过 Lax pair 为 Kaup--Newell、Chen--Lee--Liu 和 Gerdjikov--Ivanov 三类 DNLS
